<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;min-height:100vh;}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
input,textarea,button,select{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}
input[type=range]{-webkit-appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;cursor:pointer;}
.theme-light input[type=date]{color-scheme:light;}
.theme-dark input[type=date]{color-scheme:dark;}
.theme-sepia input[type=date]{color-scheme:light;}
.theme-ocean input[type=date]{color-scheme:dark;}
.theme-midnight input[type=date]{color-scheme:dark;}

.rhandle{opacity:0;transition:opacity .15s;}

/* ── ANIMATIONS ─────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalPop{from{opacity:0;transform:scale(.955) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes progressFill{from{width:0}to{width:var(--prog-w)}}
@keyframes softPulse{0%,100%{opacity:1}50%{opacity:.55}}

.fade-up{animation:fadeUp .26s cubic-bezier(.22,1,.36,1) both}
.fade-up-d1{animation:fadeUp .26s .05s cubic-bezier(.22,1,.36,1) both}
.fade-up-d2{animation:fadeUp .26s .10s cubic-bezier(.22,1,.36,1) both}
.fade-up-d3{animation:fadeUp .26s .15s cubic-bezier(.22,1,.36,1) both}
.modal-pop{animation:modalPop .22s cubic-bezier(.34,1.18,.64,1) both}
.overlay-in{animation:overlayIn .18s ease both}

/* ── CARD LIFT ──────────────────────────────────── */
.card-lift{transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.card-lift:hover{transform:translateY(-2px)}

/* ── TRIP IMAGE ZOOM ────────────────────────────── */
.trip-card .trip-thumb{transition:transform .45s ease,filter .3s ease;width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.trip-card:hover .trip-thumb{transform:scale(1.055);filter:brightness(1.07)}

/* ── NAV BUTTONS ────────────────────────────────── */
.nav-btn{transition:background .14s,color .14s,transform .12s,box-shadow .14s !important}
.nav-btn:hover{transform:translateY(-1px) !important}
.nav-btn:active{transform:scale(.95) !important}

/* ── GOAL CARDS ─────────────────────────────────── */
.goal-card{transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease,opacity .18s ease}
.goal-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.22)}

/* ── KANBAN DAY CELLS ───────────────────────────── */
.day-cell{transition:background .16s ease,border-color .16s ease,transform .14s ease}
.day-cell:hover{transform:translateY(-1px)}

/* ── WIDGET HEADER BUTTON ───────────────────────── */
.whead-btn{transition:opacity .15s,transform .15s,color .15s !important}
.whead-btn:hover{opacity:.78 !important;transform:translateX(2px) !important}

/* ── TASK ROW ───────────────────────────────────── */
.task-row{transition:background .14s ease,transform .12s ease}
.task-row:hover{transform:translateX(2px)}

/* ── BADGE HOVER ────────────────────────────────── */
.badge-hover{transition:transform .14s ease,filter .14s ease}
.badge-hover:hover{transform:scale(1.06);filter:brightness(1.15)}

/* ── BINGO ──────────────────────────────────────── */
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes cellPop{0%{transform:scale(1)}40%{transform:scale(1.18)}70%{transform:scale(.93)}100%{transform:scale(1)}}
@keyframes bingoFlash{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes checkDrop{from{opacity:0;transform:scale(.4) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
.bingo-cell{transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .2s ease,border-color .2s ease,background .2s ease}
.bingo-cell:hover{transform:scale(1.06)}
.bingo-cell-pop{animation:cellPop .35s cubic-bezier(.34,1.56,.64,1) both}
.bingo-line-cell{animation:bingoFlash 2s ease infinite}
.bingo-check{animation:checkDrop .3s cubic-bezier(.34,1.56,.64,1) .05s both}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useContext,createContext}=React;

// ── COLOR SYSTEM ──────────────────────────────────────
function h2r(h){const n=parseInt((h||'#000').replace('#','').slice(0,6),16);return[(n>>16)&255,(n>>8)&255,n&255];}
function r2h(r,g,b){return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v|0)).toString(16).padStart(2,'0')).join('');}
function mix(h1,h2,t){const[r1,g1,b1]=h2r(h1),[r2,g2,b2]=h2r(h2);return r2h(r1+t*(r2-r1),g1+t*(g2-g1),b1+t*(b2-b1));}
function lighten(h,n){const[r,g,b]=h2r(h);return r2h(r+n,g+n,b+n);}
function alpha(h,a){const[r,g,b]=h2r(h);return`rgba(${r},${g},${b},${a})`;}

// palette: [0]=Primary [1]=Danger [2]=Text [3]=Surface [4]=Background
const DEFAULT_PALETTE=["#EE8434","#C95D63","#E5E5E5","#074A37","#06070E"];
const THEME_PRESETS=[
  {name:"dark",    label:"Dark",    icon:"🌙", mode:"dark",  palette:DEFAULT_PALETTE},
  {name:"light",   label:"Light",   icon:"☀️", mode:"light", palette:DEFAULT_PALETTE},
  {name:"sepia",   label:"Sepia",   icon:"📜", mode:"light", palette:["#b5714a","#c04b5a","#4a2e1e","#c4a882","#f5ede3"]},
  {name:"ocean",   label:"Ocean",   icon:"🌊", mode:"dark",  palette:["#22d3ee","#f43f5e","#cff4ff","#0e3a5c","#020c18"]},
  {name:"midnight",label:"Midnight",icon:"✦",  mode:"dark",  palette:["#a78bfa","#f87171","#ede9fe","#1e1b4b","#080510"]},
];

function buildDark([p1,p2,p3,p4,p5]){
  const sec=lighten(p4,108);
  const yel=mix(p1,p3,.22);
  return{
    bg:p5,card:mix(p5,p4,.52),cardAlt:mix(p5,p4,.37),
    border:mix(p5,p4,.27),borderSft:mix(p5,p4,.18),inp:mix(p5,p4,.08),
    mint:p1,mintX:alpha(p1,.12),
    blue:sec,blueX:alpha(sec,.12),
    pink:p2,pinkX:alpha(p2,.12),
    yellow:yel,yellX:alpha(yel,.12),
    text:p3,textMd:mix(p3,p5,.56),textLt:mix(p3,p5,.76),
    overlay:alpha(p5,.90),isDark:true,
  };
}
function buildLight([p1,p2,p3,p4,p5]){
  const W='#FFFFFF';
  const sec=mix(p4,W,.38);
  const txt=mix(p5,p4,.55);
  return{
    bg:mix(p3,W,.6),card:mix(p3,W,.82),cardAlt:mix(p3,W,.42),
    border:mix(p3,p4,.15),borderSft:mix(p3,p4,.08),inp:W,
    mint:mix(p1,p5,.18),mintX:alpha(p1,.1),
    blue:sec,blueX:alpha(p4,.1),
    pink:mix(p2,p5,.15),pinkX:alpha(p2,.1),
    yellow:mix(p1,W,.25),yellX:alpha(p1,.1),
    text:txt,textMd:mix(txt,p3,.42),textLt:mix(txt,p3,.62),
    overlay:'rgba(0,0,0,.5)',isDark:false,
  };
}

function parseCoolorsUrl(url){
  const m=url.trim().match(/([0-9a-fA-F]{6}(?:-[0-9a-fA-F]{6})+)/);
  if(!m) return null;
  const cols=m[1].split('-').map(h=>'#'+h.toUpperCase());
  return cols.length>=5?cols.slice(0,5):null;
}

const TC=createContext(buildDark(DEFAULT_PALETTE));
const useT=()=>useContext(TC);
const F="'Helvetica Neue',Helvetica,Arial,sans-serif";

// ── UTILS ──────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const toStr=d=>(d instanceof Date?d:new Date(d)).toISOString().split("T")[0];
const fromStr=s=>new Date(s+"T12:00:00");
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const getMon=d=>{const dy=d.getDay();return addDays(d,dy===0?-6:1-dy);};
const MFULL=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONS3=["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
const D3=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const PC=(T)=>({low:T.mint,medium:T.yellow,high:T.pink});
const WDEFS=[
  {id:"calendar",label:"Calendar",icon:"◷",visible:true},
  {id:"wakuli",  label:"Wakuli",  icon:"◈",visible:true},
  {id:"kanban",  label:"Week",    icon:"▦",visible:true},
  {id:"trips",   label:"Trips",   icon:"◎",visible:true},
  {id:"goals",   label:"Goals",   icon:"◉",visible:true},
  {id:"entropy", label:"Entropy", icon:"✦",visible:true},
  {id:"radar",   label:"Radar",   icon:"🔭",visible:true},
  {id:"embed",   label:"Embed",   icon:"⧉",visible:true},
  {id:"projects",label:"Projects",icon:"⊞",visible:true},
];
const DSPAN={calendar:1,wakuli:1,kanban:3,trips:1,goals:2,entropy:1,radar:1,embed:1,projects:1};
const TASK_TAGS={urgent:"#f87171",research:"#38bdf8",personal:"#a78bfa",music:"#f97316",creative:"#f472b6",admin:"#6ee7b7"};
const WCOL=(T)=>({calendar:T.blue,wakuli:T.yellow,kanban:T.mint,trips:T.mint,goals:T.blue,entropy:"#a78bfa",radar:"#38bdf8",embed:T.textMd,projects:T.mint});

// ── 2D GRID LAYOUT ─────────────────────────────────
const GCOLS=16,GROW_H=96,GGAP=8;
const DEFAULT_LAYOUT={
  calendar:{col:1, row:1, cS:5,rS:6},
  wakuli:  {col:6, row:1, cS:5,rS:6},
  kanban:  {col:11,row:1, cS:6,rS:6},
  trips:   {col:1, row:7, cS:5,rS:5},
  goals:   {col:6, row:7, cS:6,rS:5},
  embed:   {col:12,row:7, cS:5,rS:5},
  entropy: {col:1, row:12,cS:5,rS:5},
  radar:   {col:6, row:12,cS:6,rS:5},
  projects:{col:12,row:12,cS:5,rS:5},
};

// ── COLLISION RESOLUTION ───────────────────────────
function rectOverlaps(a,b){
  return !(a.col+a.cS<=b.col||b.col+b.cS<=a.col||a.row+a.rS<=b.row||b.row+b.rS<=a.row);
}
function resolveCollisions(layoutMap,movedId){
  const L={};for(const k of Object.keys(layoutMap))L[k]={...layoutMap[k]};
  const ids=Object.keys(L);
  let dirty=true,pass=0;
  while(dirty&&pass<40){
    dirty=false;pass++;
    const sorted=ids.filter(id=>id!==movedId).sort((a,b)=>L[a].row-L[b].row||L[a].col-L[b].col);
    for(const id of sorted){
      for(const oid of ids){
        if(id===oid)continue;
        if(rectOverlaps(L[id],L[oid])){
          const newRow=L[oid].row+L[oid].rS;
          if(newRow>L[id].row){L[id]={...L[id],row:newRow};dirty=true;}
        }
      }
    }
  }
  return L;
}

function lg(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── QUICK CAPTURE PARSER ───────────────────────────
function parseDate(text){
  const today=new Date(),lower=text.toLowerCase();
  if(/\btomorrow\b/.test(lower)) return toStr(addDays(today,1));
  if(/\bnext\s+week\b/.test(lower)) return toStr(addDays(today,7));
  const DAYS=["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];
  for(let i=0;i<DAYS.length;i++){
    if(lower.includes(DAYS[i])){const diff=(i-today.getDay()+7)%7||7;return toStr(addDays(today,diff));}
  }
  for(let m=0;m<MONS3.length;m++){
    if(lower.includes(MONS3[m])||lower.includes(MFULL[m].toLowerCase())){
      const match=lower.match(/(\d{1,2})/);
      if(match){const d=new Date(today.getFullYear(),m,parseInt(match[1]));if(d<today)d.setFullYear(d.getFullYear()+1);return toStr(d);}
    }
  }
  return toStr(addDays(today,7));
}
function parseTripText(text){
  const lower=text.toLowerCase();
  const rm=lower.match(/(\d{1,2})[-–](\d{1,2})/);
  if(rm){
    for(let m=0;m<MONS3.length;m++){
      if(lower.includes(MONS3[m])||lower.includes(MFULL[m].toLowerCase())){
        const yr=new Date().getFullYear(),mm=String(m+1).padStart(2,"0");
        const dest=text.replace(new RegExp(MONS3[m]+'|'+MFULL[m],'gi'),"").replace(/\d{1,2}[-–]\d{1,2}/,"").replace(/[,!]/g,"").trim();
        return{destination:dest||text,startDate:`${yr}-${mm}-${rm[1].padStart(2,"0")}`,endDate:`${yr}-${mm}-${rm[2].padStart(2,"0")}`};
      }
    }
  }
  return{destination:text,startDate:null,endDate:null};
}
function parseCapture(raw){
  let t=raw.trim();if(!t)return null;
  let priority="medium",recurring=null;
  t=t.replace(/#high|#h\b/gi,()=>{priority="high";return "";})
     .replace(/#medium|#m\b/gi,()=>{priority="medium";return "";})
     .replace(/#low|#l\b/gi,()=>{priority="low";return "";})
     .replace(/~weekly/gi,()=>{recurring="weekly";return "";})
     .replace(/~monthly/gi,()=>{recurring="monthly";return "";}).trim();
  if(/^!goal\s+/i.test(t)){const rest=t.replace(/^!goal\s+/i,"");return{type:"goal",title:rest.replace(/\bby\s+\S+/i,"").trim(),targetDate:parseDate(rest)};}
  if(/^!trip\s+/i.test(t)){const rest=t.replace(/^!trip\s+/i,"");return{type:"trip",...parseTripText(rest)};}
  const autoTrip=parseTripText(t);
  if(autoTrip.startDate&&autoTrip.endDate) return{type:"trip",...autoTrip};
  const deadline=parseDate(t);
  const title=t.replace(/\bby\s+\S+/i,"").replace(/\bnext\s+week\b/i,"").replace(/\btomorrow\b/i,"").replace(/\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/i,"").trim()||t;
  return{type:"task",title,deadline,priority,recurring};
}

// ── SHARED UI ──────────────────────────────────────
function Card({children,style={},lift=true}){
  const T=useT();
  return <div className={lift?"card-lift":undefined} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:11,padding:"0.8rem",...style}}>{children}</div>;
}
function Btn({children,onClick,primary,small,danger,ghost,active,color,style={}}){
  const T=useT();const[h,sH]=useState(false);
  const ac=color||T.mint;
  const bg=active?ac:danger?T.pink:primary?T.mint:ghost?"transparent":T.cardAlt;
  const co=active||primary||danger?T.bg:color?color:T.text;
  const bo=active||primary?ac:danger?T.pink:color?color:T.border;
  const glow=(primary||active)&&h?`0 3px 12px ${alpha(ac,.38)}`:"none";
  return <button onClick={onClick} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)} style={{
    padding:small?"3px 8px":"6px 13px",fontSize:small?"11px":"12px",fontFamily:F,fontWeight:600,
    background:bg,color:co,border:`1px solid ${bo}`,borderRadius:7,cursor:"pointer",
    opacity:h&&!primary&&!active?0.76:1,
    transform:h?"scale(0.97)":"scale(1)",
    boxShadow:glow,
    filter:h&&(primary||active||danger)?"brightness(1.08)":"brightness(1)",
    transition:"opacity .12s,transform .12s,box-shadow .14s,filter .12s,background .14s",
    whiteSpace:"nowrap",...style,
  }}>{children}</button>;
}
function Badge({label,color}){
  const T=useT();const c=color||T.mint;
  return <span className="badge-hover" style={{background:c+"18",color:c,border:`1px solid ${c}28`,borderRadius:5,padding:"1px 6px",fontSize:10,fontWeight:700,fontFamily:F,whiteSpace:"nowrap",display:"inline-block"}}>{label}</span>;
}
function Lbl({children}){
  const T=useT();
  return <div style={{fontSize:10,fontWeight:700,color:T.textMd,fontFamily:F,marginBottom:4,letterSpacing:"0.07em",textTransform:"uppercase"}}>{children}</div>;
}
function Inp({value,onChange,placeholder,type="text",autoFocus,style={}}){
  const T=useT();
  return <input autoFocus={autoFocus} type={type} value={value} onChange={onChange} placeholder={placeholder} style={{
    width:"100%",padding:"8px 10px",borderRadius:7,border:`1px solid ${T.border}`,
    background:T.inp,color:T.text,fontSize:12,fontFamily:F,boxSizing:"border-box",outline:"none",...style,
  }}/>;
}
function Txta({value,onChange,placeholder,rows=3,autoFocus,style={}}){
  const T=useT();
  return <textarea autoFocus={autoFocus} value={value} onChange={onChange} placeholder={placeholder} rows={rows} style={{
    width:"100%",padding:"8px 10px",borderRadius:7,border:`1px solid ${T.border}`,
    background:T.inp,color:T.text,fontSize:12,fontFamily:F,boxSizing:"border-box",outline:"none",resize:"vertical",...style,
  }}/>;
}
function Empty({msg}){
  const T=useT();
  return <div style={{textAlign:"center",padding:"16px 0",color:T.textLt,fontFamily:F,fontSize:12}}>{msg}</div>;
}
function WidgetHead({id,title,icon,onPage,action}){
  const T=useT(),wc=WCOL(T);
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
    <button onClick={onPage} className="whead-btn" style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:6,color:T.text}}>
      <span style={{fontSize:12,color:wc[id]||T.mint,transition:"transform .2s"}}>{icon}</span>
      <span style={{fontSize:13,fontWeight:700,letterSpacing:"-0.2px",fontFamily:F}}>{title}</span>
      <span style={{fontSize:8,color:T.textLt,marginLeft:1,transition:"opacity .15s"}}>↗</span>
    </button>
    {action}
  </div>;
}

// ── MODAL SHELL ────────────────────────────────────
function ModalShell({title,children,onClose,onSave,wide}){
  const T=useT();
  function handleKey(e){
    if(e.key==="Escape"){onClose();return;}
    if(e.key==="Enter"&&onSave){
      const tag=e.target.tagName;
      if(tag==="TEXTAREA"||tag==="SELECT") return;
      if(tag==="BUTTON") return; // let the button handle its own click
      e.preventDefault();onSave();
    }
  }
  return <div onClick={e=>e.target===e.currentTarget&&onClose()} className="overlay-in" style={{position:"fixed",inset:0,background:T.overlay,zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
    <div className="modal-pop" onKeyDown={handleKey} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,width:"100%",maxWidth:wide?640:390,maxHeight:"88vh",overflowY:"auto",padding:"1.1rem",boxShadow:"0 32px 80px rgba(0,0,0,.72)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.85rem"}}>
        <span style={{fontFamily:F,fontWeight:700,fontSize:16,letterSpacing:"-0.2px"}}>{title}</span>
        <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:20,color:T.textLt,lineHeight:1,transition:"color .15s,transform .15s"}} onMouseEnter={e=>e.target.style.transform="rotate(90deg)"} onMouseLeave={e=>e.target.style.transform="rotate(0deg)"}>×</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:11}}>{children}</div>
      {onSave&&<div style={{display:"flex",justifyContent:"flex-end",gap:6,marginTop:"0.85rem"}}>
        <Btn onClick={onClose}>Cancel</Btn>
        <Btn primary onClick={onSave}>Save</Btn>
      </div>}
    </div>
  </div>;
}

// ── SEARCH MODAL ───────────────────────────────────
function SearchModal({tasks,trips,goals,onClose,setModal,setPage}){
  const T=useT();
  const [q,sQ]=useState("");
  const lower=q.toLowerCase();
  const res=q.length<2?[]:[
    ...tasks.filter(t=>t.title.toLowerCase().includes(lower)).map(t=>({kind:"Task",label:t.title,sub:t.deadline,color:T.yellow,action:()=>{setModal({type:"task",data:t});onClose();}})),
    ...trips.filter(t=>t.destination.toLowerCase().includes(lower)).map(t=>({kind:"Trip",label:t.destination,sub:`${t.startDate}→${t.endDate}`,color:T.mint,action:()=>{setPage("trips");onClose();}})),
    ...goals.filter(g=>g.title.toLowerCase().includes(lower)).map(g=>({kind:"Goal",label:g.title,sub:`${g.progress||0}%`,color:T.blue,action:()=>{setPage("goals");onClose();}})),
  ].slice(0,8);

  return <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:T.overlay,zIndex:500,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"12vh"}}>
    <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:13,width:"100%",maxWidth:460,boxShadow:"0 32px 80px rgba(0,0,0,.7)"}}>
      <div style={{padding:"10px 12px",display:"flex",gap:8,alignItems:"center",borderBottom:`1px solid ${T.border}`}}>
        <span style={{color:T.textMd,fontSize:14}}>⌕</span>
        <input autoFocus value={q} onChange={e=>sQ(e.target.value)} onKeyDown={e=>e.key==="Escape"&&onClose()} placeholder="Search tasks, trips, goals..." style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:13,color:T.text,fontFamily:F}}/>
        <span style={{fontSize:10,color:T.textLt,fontFamily:F}}>esc</span>
      </div>
      {q.length>=2&&<div style={{padding:"6px 0",maxHeight:300,overflowY:"auto"}}>
        {res.length===0?<div style={{padding:"14px 12px",color:T.textLt,fontSize:12,fontFamily:F,textAlign:"center"}}>No results</div>:
        res.map((r,i)=><button key={i} onClick={r.action} style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"8px 12px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
          <Badge label={r.kind} color={r.color}/>
          <span style={{flex:1,fontSize:12,fontFamily:F,color:T.text,fontWeight:500}}>{r.label}</span>
          {r.sub&&<span style={{fontSize:10,color:T.textMd,fontFamily:F}}>{r.sub}</span>}
        </button>)}
      </div>}
      <div style={{padding:"7px 12px",borderTop:`1px solid ${T.border}`,display:"flex",gap:10}}>
        {[["!trip dest month d1-d2","Trip"],["!goal title by date","Goal"],["#high ~weekly title","Task"]].map(([ex,l])=>(
          <span key={l} style={{fontSize:9,color:T.textLt,fontFamily:F}}><span style={{color:T.textMd,fontWeight:700}}>{l}:</span> {ex}</span>
        ))}
      </div>
    </div>
  </div>;
}

// ── FOCUS DAY MODAL ────────────────────────────────
function FocusDayModal({day,tasks,completions,setCompletions,setTasks,scratchpads,setScratchpads,onClose}){
  const T=useT();const ds=toStr(day);
  const dayTasks=tasks.filter(t=>!t.completed&&t.deadline>=ds);
  const scratch=scratchpads[ds]||"";
  const [localScratch,setLocalScratch]=useState(scratch);
  const amTasks=dayTasks.filter(t=>t.timeBlock==="am");
  const pmTasks=dayTasks.filter(t=>t.timeBlock==="pm");
  const anyTasks=dayTasks.filter(t=>!t.timeBlock);
  function toggle(tid){setCompletions(p=>({...p,[`${tid}_${ds}`]:!p[`${tid}_${ds}`]}));}
  function setBlock(tid,block){setTasks(p=>p.map(t=>t.id===tid?{...t,timeBlock:t.timeBlock===block?null:block}:t));}
  function saveScratch(v){setLocalScratch(v);setScratchpads(p=>({...p,[ds]:v}));}
  const TaskRow=({task})=>{
    const done=completions[`${task.id}_${ds}`];
    const pcs=PC(T);
    return <div style={{display:"flex",alignItems:"center",gap:7,padding:"6px 8px",borderRadius:8,background:done?T.mintX:T.cardAlt,border:`1px solid ${T.borderSft}`,marginBottom:4,opacity:done?0.5:1}}>
      <div onClick={()=>toggle(task.id)} style={{width:12,height:12,borderRadius:3,border:`1.5px solid ${done?T.mint:pcs[task.priority]||T.mint}`,background:done?T.mint:"transparent",cursor:"pointer",flexShrink:0}}/>
      <span style={{flex:1,fontSize:12,fontFamily:F,textDecoration:done?"line-through":"none",color:T.text}}>{task.title}</span>
      <span style={{fontSize:9,color:T.textLt,fontFamily:F,flexShrink:0}}>{task.deadline}</span>
      <div style={{display:"flex",gap:2}}>
        {["am","pm"].map(b=><button key={b} onClick={()=>setBlock(task.id,b)} style={{padding:"1px 5px",borderRadius:4,fontSize:9,fontFamily:F,fontWeight:700,cursor:"pointer",background:task.timeBlock===b?T.blue+"30":"transparent",color:task.timeBlock===b?T.blue:T.textLt,border:`1px solid ${task.timeBlock===b?T.blue:T.border}`}}>{b}</button>)}
      </div>
    </div>;
  };
  const Section=({title,color,tasks:ts})=>ts.length===0?null:<div style={{marginBottom:12}}>
    <div style={{fontSize:9,fontWeight:700,color,fontFamily:F,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}}>{title}</div>
    {ts.map(t=><TaskRow key={t.id} task={t}/>)}
  </div>;
  const d=day;
  const label=`${D3[(d.getDay()+6)%7]}, ${MFULL[d.getMonth()]} ${d.getDate()}`;
  return <ModalShell title={`Focus — ${label}`} onClose={onClose} wide>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <div>
        <Section title="AM" color={T.yellow} tasks={amTasks}/>
        <Section title="PM" color={T.blue} tasks={pmTasks}/>
        <Section title="Anytime" color={T.textMd} tasks={anyTasks}/>
        {dayTasks.length===0&&<Empty msg="No tasks — enjoy the day"/>}
      </div>
      <div>
        <div style={{fontSize:10,fontWeight:700,color:T.textMd,fontFamily:F,marginBottom:6,letterSpacing:"0.07em",textTransform:"uppercase"}}>Scratchpad</div>
        <textarea value={localScratch} onChange={e=>saveScratch(e.target.value)} placeholder="Notes for today, intentions, ideas..."
          style={{width:"100%",height:180,padding:"9px 10px",borderRadius:8,border:`1px solid ${T.border}`,background:T.inp,color:T.text,fontSize:12,fontFamily:F,resize:"none",outline:"none"}}/>
        <div style={{fontSize:9,color:T.textLt,fontFamily:F,marginTop:4}}>Click AM/PM on a task to assign a time block</div>
      </div>
    </div>
  </ModalShell>;
}

// ── DAILY BRIEF ────────────────────────────────────
function DailyBrief({tasks,trips,goals}){
  const T=useT();
  const today=new Date(),todayStr=toStr(today),endWeek=toStr(addDays(today,7));
  const overdue=tasks.filter(t=>!t.completed&&t.deadline<todayStr).length;
  const thisWeek=tasks.filter(t=>!t.completed&&t.deadline>=todayStr&&t.deadline<=endWeek).length;
  const nextTrip=trips.filter(t=>t.endDate>=todayStr).sort((a,b)=>a.startDate.localeCompare(b.startDate))[0];
  const daysUntil=nextTrip?Math.max(0,Math.ceil((fromStr(nextTrip.startDate)-today)/86400000)):null;
  const goalsOn=goals.filter(g=>!g.completed&&(g.progress||0)>=50).length;
  const goalsTotal=goals.filter(g=>!g.completed).length;
  const parts=[];
  if(overdue>0) parts.push({text:`${overdue} overdue`,color:T.pink});
  if(thisWeek>0) parts.push({text:`${thisWeek} due this week`,color:T.yellow});
  if(nextTrip) parts.push({text:`${nextTrip.destination} in ${daysUntil}d`,color:T.mint});
  if(goalsTotal>0) parts.push({text:`${goalsOn}/${goalsTotal} goals on track`,color:T.blue});
  if(parts.length===0) parts.push({text:"Looking clear — add something to track",color:T.textMd});
  return <div style={{background:T.cardAlt,borderBottom:`1px solid ${T.border}`,padding:"5px 1rem",display:"flex",gap:2,alignItems:"center",overflowX:"auto"}}>
    <span style={{fontSize:9,fontWeight:700,color:T.textMd,fontFamily:F,letterSpacing:"0.07em",textTransform:"uppercase",marginRight:8,flexShrink:0}}>{today.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</span>
    {parts.map((p,i)=><React.Fragment key={i}>
      {i>0&&<span style={{color:T.textLt,fontSize:10,flexShrink:0,padding:"0 4px"}}>·</span>}
      <span style={{fontSize:11,color:p.color,fontFamily:F,fontWeight:500,whiteSpace:"nowrap"}}>{p.text}</span>
    </React.Fragment>)}
  </div>;
}

// ── QUICK CAPTURE ──────────────────────────────────
function QuickCapture({captureRef,setTasks,setTrips,setGoals,setModal}){
  const T=useT();
  const [val,sV]=useState("");
  const [hint,sH]=useState(null);
  function onChange(e){const v=e.target.value;sV(v);if(v.trim().length>2){const p=parseCapture(v);sH(p);}else sH(null);}
  function onKey(e){
    if(e.key==="Enter"&&val.trim()){
      const p=parseCapture(val);
      if(!p){sV("");sH(null);return;}
      if(p.type==="task"&&p.title){setTasks(prev=>[...prev,{id:uid(),title:p.title,deadline:p.deadline,priority:p.priority,recurring:p.recurring||null,notes:"",completed:false,timeBlock:null}]);}
      else if(p.type==="trip"&&p.startDate){setTrips(prev=>[...prev,{id:uid(),destination:p.destination,startDate:p.startDate,endDate:p.endDate,notes:"",phase:"planning",packingList:[]}]);}
      else if(p.type==="goal"&&p.title){setGoals(prev=>[...prev,{id:uid(),title:p.title,targetDate:p.targetDate||"",description:"",progress:0,completed:false,lastTouched:null}]);}
      else{setModal({type:p.type==="trip"?"trip":p.type==="goal"?"goal":"task"});sV("");sH(null);return;}
      sV("");sH(null);
    }
    if(e.key==="Escape"){sV("");sH(null);e.target.blur();}
  }
  const typeColor=hint?{task:T.yellow,trip:T.mint,goal:T.blue}[hint.type]||T.textMd:T.textMd;
  return <div style={{background:T.bg,borderBottom:`1px solid ${T.border}`,padding:"6px 1rem"}}>
    <div style={{margin:"0 auto",display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:12,color:T.textLt,flexShrink:0}}>⌘</span>
      <input ref={captureRef} value={val} onChange={onChange} onKeyDown={onKey} placeholder='Quick capture — task, "!trip Paris apr 10-15", "!goal learn piano" → Enter' style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:12,color:T.text,fontFamily:F}}/>
      {hint&&<span style={{fontSize:10,fontWeight:700,color:typeColor,fontFamily:F,flexShrink:0,textTransform:"uppercase",letterSpacing:"0.05em"}}>{hint.type}</span>}
    </div>
  </div>;
}

// ── CALENDAR ───────────────────────────────────────
function CalendarWidget({tasks,trips,goals,completions,pageMode}){
  const T=useT();
  const now=new Date(),todayStr=toStr(now);
  const [calTab,setCalTab]=useState("calendar"); // "calendar" | "timeline"
  const [month,setMonth]=useState(now.getMonth());
  const [year,setYear]=useState(now.getFullYear());
  const dIM=new Date(year,month+1,0).getDate();
  const sP=(new Date(year,month,1).getDay()+6)%7;
  const cells=[...Array(sP).fill(null),...Array.from({length:dIM},(_,i)=>i+1)];
  const prev=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const next=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};
  const ms=`${year}-${String(month+1).padStart(2,"0")}`;
  const mEnd=`${ms}-${String(dIM).padStart(2,"0")}`;

  // Collect all events visible in this month
  const evs=[];
  trips.forEach(t=>{
    if(t.endDate>=`${ms}-01`&&t.startDate<=mEnd)
      evs.push({s:t.startDate,e:t.endDate,color:T.mint});
  });
  tasks.filter(t=>!t.completed&&t.deadline&&t.deadline.startsWith(ms))
    .forEach(t=>evs.push({s:t.deadline,e:t.deadline,color:T.yellow}));
  goals.filter(g=>g.targetDate&&g.targetDate.startsWith(ms))
    .forEach(g=>evs.push({s:g.targetDate,e:g.targetDate,color:T.blue}));

  // Group cells into rows of 7
  const weekRows=[];
  for(let i=0;i<cells.length;i+=7) weekRows.push(cells.slice(i,i+7));

  const cal=<>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <span style={{fontFamily:F,fontWeight:700,fontSize:pageMode?16:13,letterSpacing:"-0.3px"}}>{MFULL[month]} {year}</span>
      <div style={{display:"flex",gap:3}}>
        <Btn small onClick={prev}>‹</Btn>
        <Btn small ghost onClick={()=>{setMonth(now.getMonth());setYear(now.getFullYear());}} style={{fontSize:9}}>Today</Btn>
        <Btn small onClick={next}>›</Btn>
      </div>
    </div>
    {/* Day header row */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
      {["M","T","W","T","F","S","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,color:T.textMd,fontWeight:700,fontFamily:F,aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center"}}>{d}</div>)}
    </div>
    {/* Week rows — numbers + event bars */}
    <div style={{display:"flex",flexDirection:"column",gap:3}}>
      {weekRows.map((week,wi)=>{
        const wDates=week.map(day=>day?`${ms}-${String(day).padStart(2,"0")}`:null);
        const valid=wDates.filter(Boolean);
        if(!valid.length) return null;
        const wStart=valid[0],wEnd=valid[valid.length-1];
        const wEvs=evs.filter(ev=>ev.e>=wStart&&ev.s<=wEnd);
        return <div key={wi}>
          {/* Day numbers */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
            {week.map((day,di)=>{
              if(!day) return <div key={"p"+di} style={{aspectRatio:"1"}}/>;
              const ds=wDates[di],isT=ds===todayStr;
              return <div key={ds} style={{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:5,background:isT?T.mint:"transparent"}}>
                <span style={{fontSize:11,lineHeight:"1",color:isT?T.bg:T.text,fontWeight:isT?700:400,fontFamily:F}}>{day}</span>
              </div>;
            })}
          </div>
          {/* Event span bars */}
          {wEvs.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,gridAutoFlow:"row dense",marginTop:2}}>
            {wEvs.map((ev,ei)=>{
              let sc=wDates.findIndex(d=>d&&d>=ev.s);
              if(sc===-1) sc=wDates.findIndex(d=>d!==null);
              let ec=-1;
              for(let i=6;i>=0;i--){if(wDates[i]&&wDates[i]<=ev.e){ec=i;break;}}
              if(sc===-1||ec===-1||sc>ec) return null;
              const rL=wDates[sc]===ev.s, rR=wDates[ec]===ev.e;
              return <div key={ei} style={{
                gridColumn:`${sc+1}/${ec+2}`,
                height:4,
                borderRadius:`${rL?3:0}px ${rR?3:0}px ${rR?3:0}px ${rL?3:0}px`,
                background:ev.color,opacity:0.88,
              }}/>;
            })}
          </div>}
        </div>;
      })}
    </div>
    {/* Legend — thick bars instead of dots */}
    <div style={{display:"flex",gap:9,marginTop:8,paddingTop:7,borderTop:`1px solid ${T.border}`}}>
      {[["Tasks",T.yellow],["Trips",T.mint],["Goals",T.blue]].map(([l,c])=>(
        <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
          <div style={{width:14,height:4,borderRadius:2,background:c}}/><span style={{fontSize:9,color:T.textMd,fontFamily:F}}>{l}</span>
        </div>
      ))}
    </div>
  </>;
  // ── Heat map (last 91 days) ──────────────────────
  const heatDates=Array.from({length:91},(_,i)=>{const d=new Date(now);d.setDate(now.getDate()-90+i);return toStr(d);});
  const countByDate={};
  Object.entries(completions||{}).forEach(([k,v])=>{if(v){const date=k.split("_").pop();countByDate[date]=(countByDate[date]||0)+1;}});
  const maxCount=Math.max(1,...Object.values(countByDate));
  const totalDone=Object.values(countByDate).reduce((a,b)=>a+b,0);
  const activeDays=Object.keys(countByDate).filter(d=>d>=heatDates[0]&&d<=heatDates[90]).length;
  const heatMap=<Card>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
      <span style={{fontSize:10,fontWeight:700,color:T.mint,fontFamily:F,letterSpacing:"0.06em",textTransform:"uppercase"}}>90-day activity</span>
      <span style={{fontSize:10,color:T.textLt,fontFamily:F}}>{totalDone} completions · {activeDays} active days</span>
    </div>
    <div style={{display:"flex",gap:3,overflowX:"auto"}}>
      {Array.from({length:13},(_,week)=>(
        <div key={week} style={{display:"flex",flexDirection:"column",gap:3}}>
          {Array.from({length:7},(_,day)=>{
            const idx=week*7+day;
            if(idx>=91) return <div key={day} style={{width:11,height:11}}/>;
            const ds=heatDates[idx];
            const count=countByDate[ds]||0;
            const isToday=ds===todayStr;
            const intensity=count===0?0:Math.min(1,count/maxCount);
            const bg=count===0?T.border:`rgba(74,222,128,${0.18+intensity*0.82})`;
            return <div key={day} title={`${ds}: ${count} task${count!==1?"s":""} completed`} style={{
              width:11,height:11,borderRadius:2,
              background:bg,
              outline:isToday?`2px solid ${T.mint}`:undefined,
              outlineOffset:1,
              transition:"background 0.15s",
            }}/>;
          })}
        </div>
      ))}
    </div>
    <div style={{display:"flex",gap:5,marginTop:7,alignItems:"center",justifyContent:"flex-end"}}>
      <span style={{fontSize:9,color:T.textLt,fontFamily:F}}>Less</span>
      {[0,0.25,0.5,0.75,1].map(i=><div key={i} style={{width:10,height:10,borderRadius:2,background:i===0?T.border:`rgba(74,222,128,${0.18+i*0.82})`}}/>)}
      <span style={{fontSize:9,color:T.textLt,fontFamily:F}}>More</span>
    </div>
  </Card>;

  // ── Timeline ────────────────────────────────────
  function buildTimeline(){
    const evts=[];
    tasks.filter(t=>!t.completed&&t.deadline).forEach(t=>evts.push({date:t.deadline,end:t.deadline,type:"task",label:t.title,color:T.yellow,sub:t.recurring?`↺ ${t.recurring}`:"",id:t.id}));
    trips.forEach(t=>evts.push({date:t.startDate,end:t.endDate,type:"trip",label:t.destination,color:T.mint,sub:`${t.startDate} → ${t.endDate}`,id:t.id}));
    goals.filter(g=>!g.completed&&g.targetDate).forEach(g=>evts.push({date:g.targetDate,end:g.targetDate,type:"goal",label:g.title,color:T.blue,sub:`${g.progress||0}% complete`,id:g.id}));
    return evts.sort((a,b)=>a.date.localeCompare(b.date));
  }
  const TYPE_ICON={task:"◈",trip:"◎",goal:"◉"};
  const timeline=<div style={{height:"100%",overflowY:"auto"}}>
    {(()=>{
      const evts=buildTimeline();
      if(!evts.length) return <div style={{padding:"24px 0",textAlign:"center",color:T.textLt,fontSize:12,fontFamily:F}}>No upcoming events</div>;
      let lastMonth="";
      return evts.map((ev,i)=>{
        const m=ev.date.slice(0,7);
        const showMonth=m!==lastMonth;if(showMonth)lastMonth=m;
        const isPast=ev.date<todayStr;
        const isToday=ev.date===todayStr;
        return <div key={ev.id+i}>
          {showMonth&&<div style={{fontSize:9,fontWeight:700,color:T.textLt,fontFamily:F,letterSpacing:"0.07em",textTransform:"uppercase",padding:"12px 0 5px",borderBottom:`1px solid ${T.border}`,marginBottom:6}}>{MFULL[parseInt(m.slice(5,7))-1]} {m.slice(0,4)}</div>}
          <div style={{display:"flex",gap:10,alignItems:"flex-start",padding:"6px 0",opacity:isPast?0.5:1}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:0,flexShrink:0}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:isToday?T.mint:ev.color,marginTop:4,flexShrink:0,boxShadow:isToday?`0 0 0 3px ${T.mint}33`:undefined}}/>
              {i<evts.length-1&&<div style={{width:1,height:18,background:T.border,marginTop:2}}/>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                <span style={{fontSize:9,color:ev.color,fontFamily:F,fontWeight:700}}>{TYPE_ICON[ev.type]}</span>
                <span style={{fontSize:12,fontFamily:F,fontWeight:600,color:T.text}}>{ev.label}</span>
                {isToday&&<span style={{fontSize:9,background:T.mint+"22",color:T.mint,padding:"1px 5px",borderRadius:4,fontFamily:F,fontWeight:700}}>today</span>}
              </div>
              {ev.sub&&<div style={{fontSize:10,color:T.textMd,fontFamily:F,marginTop:1}}>{ev.sub}</div>}
            </div>
            <span style={{fontSize:10,color:isToday?T.mint:T.textLt,fontFamily:F,flexShrink:0,fontWeight:isToday?700:400}}>{ev.date}</span>
          </div>
        </div>;
      });
    })()}
  </div>;

  const tabBar=<div style={{display:"flex",gap:1,marginBottom:8,background:T.cardAlt,borderRadius:7,padding:2}}>
    {[["calendar","◷ Calendar"],["timeline","⌇ Timeline"]].map(([id,label])=>(
      <button key={id} onClick={()=>setCalTab(id)}
        style={{flex:1,padding:"4px 0",borderRadius:5,background:calTab===id?T.card:"transparent",border:"none",cursor:"pointer",fontFamily:F,fontSize:11,fontWeight:calTab===id?700:400,color:calTab===id?T.text:T.textLt,transition:"all 0.12s"}}>
        {label}
      </button>
    ))}
  </div>;

  if(!pageMode) return calTab==="timeline"?<>{tabBar}{timeline}</>:cal;
  const mT=tasks.filter(t=>!t.completed&&t.deadline&&t.deadline.startsWith(ms));
  const mTr=trips.filter(t=>t.startDate.startsWith(ms)||t.endDate.startsWith(ms));
  return <div style={{display:"flex",flexDirection:"column",gap:"0.6rem"}}>
    {tabBar}
    {calTab==="timeline"
      ?<Card style={{minHeight:340}}>{timeline}</Card>
      :<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem",alignItems:"start"}}>
        <Card>{cal}</Card>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          <Card>
            <div style={{fontSize:10,fontWeight:700,color:T.yellow,fontFamily:F,marginBottom:7,letterSpacing:"0.06em",textTransform:"uppercase"}}>Tasks this month</div>

// ── KANBAN ─────────────────────────────────────────
function KanbanWidget({tasks,completions,setCompletions,onAddTask,onFocusDay,pageMode}){
  const T=useT();
  const [offset,setOffset]=useState(0);
  const today=new Date(),todayStr=toStr(today);
  const ws=addDays(getMon(today),offset*7);
  const days=Array.from({length:7},(_,i)=>addDays(ws,i));
  const wkLabel=offset===0?"This Week":offset===1?"Next Week":offset===-1?"Last Week":`Wk ${offset>0?"+"+offset:offset}`;
  const max=pageMode?9:5;
  const tasksForDay=ds=>tasks.filter(t=>!t.completed&&t.deadline>=ds);
  const toggle=(tid,ds)=>setCompletions(p=>({...p,[`${tid}_${ds}`]:!p[`${tid}_${ds}`]}));
  return <>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
