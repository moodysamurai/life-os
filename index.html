        <div>{tabBtn('grid','WARDROBE')}{tabBtn('outfits','OUTFITS')}{tabBtn('analytics','ANALYTICS')}</div>
        {subTab==='grid'&&<button onClick={()=>setShowAddItem(true)} style={{fontFamily:PP_M,fontSize:10,letterSpacing:'0.15em',background:T.text,border:'none',padding:'6px 14px',cursor:'pointer',color:T.bg,borderRadius:2,marginBottom:8}}>+ ADD ITEM</button>}
      </div>
      {subTab==='grid'&&<WardrobeGrid items={filteredItems} wears={wardrobeWears} filters={filters} setFilters={setFilters} onSelectItem={setSelectedItem}/>}
      {subTab==='outfits'&&<OutfitBuilder items={wardrobeItems} outfits={wardrobeOutfits} setOutfits={setWardrobeOutfits} wears={wardrobeWears} setWears={setWardrobeWears}/>}
      {subTab==='analytics'&&<WardrobeAnalytics items={wardrobeItems}/>}
      {showAddItem&&<AddItemModal onClose={()=>setShowAddItem(false)} onSave={item=>{setWardrobeItems(p=>[...p,item]);setShowAddItem(false);}} imgbbApiKey={imgbbApiKey} removeBgKey={removeBgKey}/>}
      {selectedItem&&<ItemDetailModal item={selectedItem} wears={wardrobeWears} setWears={setWardrobeWears} onClose={()=>setSelectedItem(null)} onEdit={()=>{setEditingItem(selectedItem);setSelectedItem(null);}} onDelete={()=>{setWardrobeItems(p=>p.filter(i=>i.id!==selectedItem.id));setWardrobeWears(p=>p.filter(w=>w.item_id!==selectedItem.id));setSelectedItem(null);}}/>}
      {editingItem&&<AddItemModal item={editingItem} onClose={()=>setEditingItem(null)} onSave={updated=>{setWardrobeItems(p=>p.map(i=>i.id===updated.id?updated:i));setEditingItem(null);}} imgbbApiKey={imgbbApiKey} removeBgKey={removeBgKey}/>}
    </div>
  );
}

// ── APP ────────────────────────────────────────────
function App(){
  const [mode,setMode]=useState(()=>lg("plo3_mode","light"));
  useEffect(()=>{ls("plo3_mode",mode);},[mode]);
  const T=useMemo(()=>mode==='dark'?buildPaperDark():buildPaper(),[mode]);

  const [isMobile,setIsMobile]=useState(()=>window.innerWidth<768);
  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);

  // Data state
  const [tasks,setTasks]=useState(()=>lg("plo3_tasks",[]));
  const [trips,setTrips]=useState(()=>lg("plo3_trips",[]));
  const [goals,setGoals]=useState(()=>lg("plo3_goals",[]));
  const [bingo,setBingo]=useState(()=>lg("plo3_bingo",DEFAULT_BINGO));
  const [completions,setCompletions]=useState(()=>lg("plo3_completions",{}));
  const [notes,setNotes]=useState(()=>lg("plo3_notes",[]));
  const [photos,setPhotos]=useState(()=>lg("plo3_photos",{}));
  const [scratchpads,setScratchpads]=useState(()=>lg("plo3_scratchpads",{}));
  const [wardrobeItems,setWardrobeItems]=useState(()=>lg("plo3_wrd_items",[]));
  const [wardrobeWears,setWardrobeWears]=useState(()=>lg("plo3_wrd_wears",[]));
  const [wardrobeOutfits,setWardrobeOutfits]=useState(()=>lg("plo3_wrd_outfits",[]));
  const [imgbbApiKey,setImgbbApiKey]=useState(()=>lg("plo3_imgbb_key",""));
  const [removeBgKey,setRemoveBgKey]=useState(()=>lg("plo3_removebg_key",""));
  const [apiKey,setApiKey]=useState(()=>lg("plo3_apikey",""));
  const [budget,setBudget]=useState(()=>lg("plo3_budget",[]));
  const [envelopes,setEnvelopes]=useState(()=>lg("plo3_envelopes",[]));
  const [budgetCats,setBudgetCats]=useState(()=>lg("plo3_budget_cats",DEFAULT_BUDGET_CATS));
  const [appleCal,setAppleCal]=useState(()=>lg("plo3_apple_cal",{workerUrl:APPLE_WORKER_URL,user:"",pass:"",enabled:false}));
  const [appleEvents,setAppleEvents]=useState([]);
  const [appleStatus,setAppleStatus]=useState("idle");
  const [showAppleCal,setShowAppleCal]=useState(false);

  // Page + UI state
  const [page,setPage]=useState(()=>lg("plo3_page","today"));
  const [modal,setModal]=useState(null);
  const [focusDay,setFocusDay]=useState(null);
  const [searchOpen,setSearchOpen]=useState(false);
  const [showCapture,setShowCapture]=useState(false);
  const [tripSugg,setTripSugg]=useState({});
  const [loadingSugg,setLoadingSugg]=useState(null);
  const captureRef=useRef(null);

  // Quote + sun + day
  const [quoteIdx,setQuoteIdx]=useState(()=>Math.floor(Math.random()*PP_QUOTES.length));
  // Sun times: fetch real sunrise/sunset from sunrise-sunset.org, keep local calc as immediate fallback
  const [sun,setSun]=useState(()=>calcSunTimes(52.1578,4.5353,new Date()));
  useEffect(()=>{
    const today=toStr(new Date());
    const TZ='Europe/Amsterdam';
    const fmtHM=iso=>{
      try{return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:TZ});}
      catch(e){return null;}
    };
    fetch(`https://api.sunrise-sunset.org/json?lat=52.1578&lng=4.5353&date=${today}&formatted=0`)
      .then(r=>r.json())
      .then(d=>{
        if(!d||d.status!=='OK'||!d.results)return;
        const rise=fmtHM(d.results.sunrise);
        const set=fmtHM(d.results.sunset);
        // Golden hour ≈ 1h before sunset (matches prior behavior; civil_twilight_end available if desired)
        const goldenISO=new Date(new Date(d.results.sunset).getTime()-60*60*1000).toISOString();
        const golden=fmtHM(goldenISO);
        if(rise&&set&&golden)setSun({rise,set,golden});
      })
      .catch(()=>{/* keep local fallback */});
  },[]);
  const now=new Date();
  const dayOfYear=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);

  // Cloud sync
  const [supaUrl,setSupaUrl]=useState(()=>lg("plo3_supa_url",""));
  const [supaKey,setSupaKey]=useState(()=>lg("plo3_supa_key",""));
  const [supaId,setSupaId]=useState(()=>lg("plo3_supa_id",""));
  const [syncStatus,setSyncStatus]=useState("idle");
  const [showSyncModal,setShowSyncModal]=useState(false);
  const supaRtRef=useRef(null);
  const suppressPushRef=useRef(0);
  const syncTimerRef=useRef(null);
  const syncReadyRef=useRef(false);

  // Undo
  const undoStackRef=useRef([]);
  const [undoToast,setUndoToast]=useState(null);
  const pushUndo=action=>{undoStackRef.current=[...undoStackRef.current.slice(-9),action];};
  function doUndo(){
    const action=undoStackRef.current.pop();
    if(!action)return;
    const label=action.payload.title||action.payload.destination||"item";
    if(action.type==="DELETE_TASK")setTasks(p=>[action.payload,...p]);
    if(action.type==="DELETE_TRIP")setTrips(p=>[action.payload,...p]);
    if(action.type==="DELETE_GOAL")setGoals(p=>[action.payload,...p]);
    setUndoToast(`↩ Restored: ${label}`);
    clearTimeout(undoStackRef._t);
    undoStackRef._t=setTimeout(()=>setUndoToast(null),2500);
  }

  // LocalStorage persistence
  useEffect(()=>ls("plo3_page",page),[page]);
  useEffect(()=>ls("plo3_tasks",tasks),[tasks]);
  useEffect(()=>ls("plo3_trips",trips),[trips]);
  useEffect(()=>ls("plo3_goals",goals),[goals]);
  useEffect(()=>ls("plo3_bingo",bingo),[bingo]);
  useEffect(()=>ls("plo3_completions",completions),[completions]);
  useEffect(()=>ls("plo3_notes",notes),[notes]);
  useEffect(()=>ls("plo3_photos",photos),[photos]);
  useEffect(()=>ls("plo3_scratchpads",scratchpads),[scratchpads]);
  useEffect(()=>ls("plo3_wrd_items",wardrobeItems),[wardrobeItems]);
  useEffect(()=>ls("plo3_wrd_wears",wardrobeWears),[wardrobeWears]);
  useEffect(()=>ls("plo3_wrd_outfits",wardrobeOutfits),[wardrobeOutfits]);
  useEffect(()=>ls("plo3_imgbb_key",imgbbApiKey),[imgbbApiKey]);
  useEffect(()=>ls("plo3_removebg_key",removeBgKey),[removeBgKey]);
  useEffect(()=>ls("plo3_apikey",apiKey),[apiKey]);
  useEffect(()=>ls("plo3_budget",budget),[budget]);
  useEffect(()=>ls("plo3_envelopes",envelopes),[envelopes]);
  useEffect(()=>ls("plo3_budget_cats",budgetCats),[budgetCats]);
  useEffect(()=>ls("plo3_apple_cal",appleCal),[appleCal]);
  useEffect(()=>ls("plo3_supa_url",supaUrl),[supaUrl]);
  useEffect(()=>ls("plo3_supa_key",supaKey),[supaKey]);
  useEffect(()=>ls("plo3_supa_id",supaId),[supaId]);

  // URL import handler (Apple Shortcuts)
  useEffect(()=>{
    const sp=new URLSearchParams(window.location.search);
    if(sp.get("bimport")==="1"){
      const amt=parseFloat(sp.get("amount")||"0");
      const desc=sp.get("desc")||"";
      const date=sp.get("date")||new Date().toISOString().slice(0,10);
      const type=(sp.get("type")||"expense").toLowerCase()==="income"?"income":"expense";
      const cat=sp.get("cat")||"Other";
      if(amt>0){
        setBudget(p=>[...p,{id:uid(),date,amount:amt,type,category:cat,description:desc}]);
        setPage("money");
      }
      history.replaceState({},"",window.location.pathname);
    }
  },[]);// eslint-disable-line

  // Supabase sync helpers
  const supaSetters=React.useMemo(()=>({setTasks,setTrips,setGoals,setCompletions,setNotes,
    setScratchpads,setBingo,setBudget,setEnvelopes,setBudgetCats,
    setWardrobeItems,setWardrobeWears,setWardrobeOutfits,
    setLayout:()=>{},setWidgets:()=>{},setNavOrder:()=>{},setMinimised:()=>{}}),[]);// eslint-disable-line

  function applyRemote(data){
    suppressPushRef.current++;
    applyGistData(data,supaSetters);
    setSyncStatus("ok");
    setTimeout(()=>{suppressPushRef.current=Math.max(0,suppressPushRef.current-1);},3000);
  }

  const pullSupa=React.useCallback(()=>{
    if(!supaUrl||!supaKey||!supaId)return;
    setSyncStatus("loading");
    supaFetch(supaUrl,supaKey,supaId)
      .then(data=>applyRemote(data))
      .catch(()=>setSyncStatus("err"));
  },[supaUrl,supaKey,supaId]);// eslint-disable-line

  useEffect(()=>{
    if(!supaUrl||!supaKey||!supaId){syncReadyRef.current=true;return;}
    setSyncStatus("loading");
    supaFetch(supaUrl,supaKey,supaId)
      .then(data=>{applyRemote(data);})
      .catch(()=>setSyncStatus("err"))
      .finally(()=>{syncReadyRef.current=true;});
    if(supaRtRef.current)supaRtRef.current.close();
    supaRtRef.current=supaRealtime(supaUrl,supaKey,supaId,(data)=>{applyRemote(data);});
    return()=>{if(supaRtRef.current){supaRtRef.current.close();supaRtRef.current=null;}};
  },[supaUrl,supaKey,supaId]);// eslint-disable-line

  useEffect(()=>{
    if(!syncReadyRef.current||!supaUrl||!supaKey||!supaId)return;
    if(suppressPushRef.current>0)return;
    clearTimeout(syncTimerRef.current);
    setSyncStatus("loading");
    syncTimerRef.current=setTimeout(()=>{
      if(suppressPushRef.current>0){setSyncStatus("ok");return;}
      const payload={tasks,trips,goals,bingo,completions,notes,scratchpads,budget,envelopes,budgetCats,wardrobeItems,wardrobeWears,wardrobeOutfits};
      supaPush(supaUrl,supaKey,supaId,payload,new Date().toISOString())
        .then(()=>setSyncStatus("ok"))
        .catch(()=>setSyncStatus("err"));
    },2000);
    return()=>clearTimeout(syncTimerRef.current);
  },[tasks,trips,goals,bingo,completions,notes,scratchpads,budget,envelopes,budgetCats,wardrobeItems,wardrobeWears,wardrobeOutfits]);// eslint-disable-line

  // Apple CalDAV auto-fetch
  useEffect(()=>{
    if(!appleCal.enabled||!appleCal.workerUrl||!appleCal.user||!appleCal.pass){setAppleEvents([]);return;}
    setAppleStatus("loading");
    fetchAppleCalendarEvents(appleCal)
      .then(evs=>{setAppleEvents(evs);setAppleStatus("ok");})
      .catch(e=>{console.error("Apple Cal:",e);setAppleStatus("err");});
    const t=setInterval(()=>{
      fetchAppleCalendarEvents(appleCal)
        .then(evs=>{setAppleEvents(evs);setAppleStatus("ok");})
        .catch(()=>setAppleStatus("err"));
    },900000);
    return()=>clearInterval(t);
  },[appleCal.enabled,appleCal.workerUrl,appleCal.user,appleCal.pass]);// eslint-disable-line

  // Keyboard shortcuts
  useEffect(()=>{
    function onKey(e){
      const tag=e.target.tagName;
      if(tag==="INPUT"||tag==="TEXTAREA"){if(e.key==="Escape"){e.target.blur();}return;}
      if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();setSearchOpen(true);return;}
      if((e.ctrlKey||e.metaKey)&&e.key==="z"){e.preventDefault();doUndo();return;}
      if(modal||searchOpen||focusDay)return;
      if(e.key==="n")setModal({type:"task"});
      if(e.key==="t")setModal({type:"trip"});
      if(e.key==="g")setModal({type:"goal"});
      if(e.key==="/"||e.key===" "){e.preventDefault();setShowCapture(true);setTimeout(()=>captureRef.current?.focus(),30);}
      if(e.key==="Escape")setPage("today");
    }
    window.addEventListener("keydown",onKey);return()=>window.removeEventListener("keydown",onKey);
  },[modal,searchOpen,focusDay]);// eslint-disable-line

  useEffect(()=>{if(showCapture)setTimeout(()=>captureRef.current?.focus(),60);},[showCapture]);

  async function getTripSugg(trip){
    if(!apiKey){setModal({type:"apikey"});return;}
    setLoadingSugg(trip.id);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`Give 6 curated things to do in ${trip.destination} (${trip.startDate} to ${trip.endDate}). Mix hidden gems, local food, culture. Raw JSON only, no markdown: [{"category":"Food","name":"...","tip":"one sentence"}]`}]})});
      const data=await res.json();
      const text=data.content?.find(c=>c.type==="text")?.text||"[]";
      setTripSugg(p=>({...p,[trip.id]:JSON.parse(text.replace(/```json|```/g,"").trim())}));
    }catch{setTripSugg(p=>({...p,[trip.id]:[{category:"Note",name:"Could not generate",tip:"Check your API key"}]}));}
    setLoadingSugg(null);
  }

  function exportICS(){
    const f=s=>s.replace(/-/g,"");
    let cal="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Pratham Life OS//EN\r\nCALSCALE:GREGORIAN\r\n";
    tasks.forEach(t=>{cal+=`BEGIN:VEVENT\r\nUID:wakuli-${t.id}@plo\r\nDTSTART;VALUE=DATE:${f(t.deadline)}\r\nDTEND;VALUE=DATE:${f(t.deadline)}\r\nSUMMARY:[Wakuli] ${t.title}\r\nEND:VEVENT\r\n`;});
    trips.forEach(t=>{cal+=`BEGIN:VEVENT\r\nUID:trip-${t.id}@plo\r\nDTSTART;VALUE=DATE:${f(t.startDate)}\r\nDTEND;VALUE=DATE:${f(t.endDate)}\r\nSUMMARY:✈ ${t.destination}\r\nEND:VEVENT\r\n`;});
    goals.forEach(g=>{if(!g.targetDate)return;cal+=`BEGIN:VEVENT\r\nUID:goal-${g.id}@plo\r\nDTSTART;VALUE=DATE:${f(g.targetDate)}\r\nDTEND;VALUE=DATE:${f(g.targetDate)}\r\nSUMMARY:[Goal] ${g.title}\r\nEND:VEVENT\r\n`;});
    cal+="END:VCALENDAR";
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([cal],{type:"text/calendar"}));a.download="pratham-2026.ics";document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  function exportJSON(){
    const payload={tasks,trips,goals,completions,notes,bingo,photos,scratchpads};
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:"application/json"}));a.download="pratham-life-os-backup.json";document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  function importJSON(){
    const inp=document.createElement("input");inp.type="file";inp.accept=".json";
    inp.onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{
      const d=JSON.parse(ev.target.result);
      if(d.tasks)setTasks(d.tasks);
      if(d.trips)setTrips(d.trips);
      if(d.goals)setGoals(d.goals);
      if(d.completions)setCompletions(d.completions);
      if(d.notes)setNotes(d.notes);
      if(d.bingo)setBingo(d.bingo);
      if(d.photos)setPhotos(d.photos);
      if(d.scratchpads)setScratchpads(d.scratchpads);
      alert("✅ Restored!");
    }catch{alert("❌ Invalid file");}};r.readAsText(file);};
    document.body.appendChild(inp);inp.click();document.body.removeChild(inp);
  }

  const maxW={maxWidth:1200,margin:'0 auto',padding:'0 2rem'};

  return <TC.Provider value={T}>
    <div className={"theme-paper"+(mode==='dark'?' theme-dark':'')} style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:PP_M,position:"relative"}}>
      <DispatchNavbar page={page} setPage={setPage} dayOfYear={dayOfYear} isMobile={isMobile} mode={mode} setMode={setMode}/>
      <PaperMetaStrip sun={sun}/>

      {page==="today"&&<>
        <PaperHero tasks={tasks} trips={trips} goals={goals} sun={sun} quoteIdx={quoteIdx} setQuoteIdx={setQuoteIdx}/>
        <PaperTodayCard tasks={tasks} setTasks={setTasks} onCapture={()=>setShowCapture(true)} setModal={setModal} appleEvents={appleEvents}/>

        {/* CALENDAR + GOALS — editorial self-contained cards */}
        <div style={{padding:'20px 2rem 0',display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:16}}>
          <PaperCalendarTodayCard tasks={tasks} trips={trips} goals={goals} completions={completions} appleEvents={appleEvents} onExpand={()=>setPage('plan')} setModal={setModal} budgetCats={budgetCats} envelopes={envelopes}/>
          <PaperGoalsTodayCard goals={goals} setGoals={setGoals} onExpand={()=>setPage('plan')}/>
        </div>

        {/* TRIPS + MONEY — inequal columns for editorial asymmetry */}
        <div style={{padding:'16px 2rem 12px',display:'grid',gridTemplateColumns:isMobile?'1fr':'1.15fr 1fr',gap:16}}>
          <PaperTripsTodayCard trips={trips} setTrips={setTrips} photos={photos} setPhotos={setPhotos} onExpand={()=>setPage('trips')} onAddTrip={()=>setModal({type:'trip'})}/>
          <PaperMoneyTodayCard envelopes={envelopes} budgetCats={budgetCats} onExpand={()=>setPage('money')}/>
        </div>
        <PaperOutfitTodayCard wardrobeItems={wardrobeItems} setWardrobeOutfits={setWardrobeOutfits} apiKey={apiKey} appleEvents={appleEvents} tasks={tasks}/>
        <PaperFooter/>
      </>}

      {page==="plan"&&<PlanPage tasks={tasks} setTasks={setTasks} goals={goals} setGoals={setGoals} completions={completions} setCompletions={setCompletions} trips={trips} appleEvents={appleEvents} setModal={setModal} setFocusDay={setFocusDay} pushUndo={pushUndo} bingo={bingo} setBingo={setBingo} apiKey={apiKey} budgetCats={budgetCats} envelopes={envelopes}/>}
      {page==="trips"&&<TripsPage trips={trips} setTrips={setTrips} photos={photos} setPhotos={setPhotos} tripSugg={tripSugg} getTripSugg={getTripSugg} loadingSugg={loadingSugg} pushUndo={pushUndo} setModal={setModal}/>}
      {page==="money"&&<MoneyPage budget={budget} setBudget={setBudget} envelopes={envelopes} setEnvelopes={setEnvelopes} budgetCats={budgetCats} setBudgetCats={setBudgetCats}/>}
      {page==="review"&&<ReviewPage tasks={tasks} setTasks={setTasks} goals={goals} apiKey={apiKey} setModal={setModal} pushUndo={pushUndo}/>}
      {page==="wk"&&<WkPage tasks={tasks} completions={completions} setCompletions={setCompletions} appleEvents={appleEvents} setModal={setModal} setFocusDay={setFocusDay}/>}
      {page==="settings"&&<SettingsPage apiKey={apiKey} syncStatus={syncStatus} onOpenSync={()=>setShowSyncModal(true)} appleCal={appleCal} setShowAppleCal={setShowAppleCal} exportJSON={exportJSON} importJSON={importJSON} exportICS={exportICS} setModal={setModal} imgbbApiKey={imgbbApiKey} setImgbbApiKey={setImgbbApiKey} removeBgKey={removeBgKey} setRemoveBgKey={setRemoveBgKey}/>}
      {page==="wardrobe"&&<WardrobePage wardrobeItems={wardrobeItems} setWardrobeItems={setWardrobeItems} wardrobeWears={wardrobeWears} setWardrobeWears={setWardrobeWears} wardrobeOutfits={wardrobeOutfits} setWardrobeOutfits={setWardrobeOutfits} imgbbApiKey={imgbbApiKey} removeBgKey={removeBgKey} pushUndo={pushUndo}/>}

      {/* CAPTURE OVERLAY */}
      {showCapture&&<div onClick={e=>e.target===e.currentTarget&&setShowCapture(false)} className="overlay-in" style={{position:"fixed",inset:0,zIndex:300,backdropFilter:"blur(14px) brightness(0.9)",WebkitBackdropFilter:"blur(14px) brightness(0.9)",display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"22vh"}}>
        <div className="modal-pop" style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:2,width:"90%",maxWidth:520,padding:"1.5rem",boxShadow:"0 24px 60px rgba(29,26,20,0.18)"}}>
          <div style={{fontSize:9,fontWeight:700,color:T.muted,fontFamily:PP_M,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:12}}>QUICK CAPTURE</div>
          <QuickCapture captureRef={captureRef} setTasks={setTasks} setTrips={setTrips} setGoals={setGoals} setModal={setModal} onClose={()=>setShowCapture(false)} inline/>
        </div>
      </div>}

      {/* MODALS */}
      {modal?.type==="task"   &&<TaskModal   data={modal.data} setTasks={setTasks} onClose={()=>setModal(null)}/>}
      {modal?.type==="trip"   &&<TripModal   data={modal.data} setTrips={setTrips} onClose={()=>setModal(null)}/>}
      {modal?.type==="goal"   &&<GoalModal   data={modal.data} setGoals={setGoals} onClose={()=>setModal(null)}/>}
      {modal?.type==="apikey" &&<ApiKeyModal current={apiKey} onClose={()=>setModal(null)} onSave={k=>{setApiKey(k);setModal(null);}}/>}
      {focusDay&&<FocusDayModal day={focusDay} tasks={tasks} completions={completions} setCompletions={setCompletions} setTasks={setTasks} scratchpads={scratchpads} setScratchpads={setScratchpads} onClose={()=>setFocusDay(null)}/>}
      {searchOpen&&<SearchModal tasks={tasks} trips={trips} goals={goals} onClose={()=>setSearchOpen(false)} setModal={setModal} setPage={setPage}/>}
      {showAppleCal&&<AppleCalModal cfg={appleCal} onSave={c=>{setAppleCal(c);setShowAppleCal(false);}} onClose={()=>setShowAppleCal(false)}/>}
      {showSyncModal&&<SyncModal
        onClose={()=>setShowSyncModal(false)}
        supaUrl={supaUrl} setSupaUrl={setSupaUrl}
        supaKey={supaKey} setSupaKey={setSupaKey}
        supaId={supaId}   setSupaId={setSupaId}
        connected={!!supaId}
        onSync={pullSupa}
        onConnect={data=>{
          applyRemote(data);
          syncReadyRef.current=true;
          if(supaRtRef.current)supaRtRef.current.close();
          supaRtRef.current=supaRealtime(supaUrl,supaKey,supaId,(d)=>{applyRemote(d);});
        }}
      />}

      {/* UNDO TOAST */}
      {undoToast&&<div className="fade-up" style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:T.card,border:`1px solid ${T.mint}44`,borderRadius:2,padding:"8px 20px",fontSize:11,fontFamily:PP_M,color:T.text,zIndex:600,boxShadow:"0 4px 24px rgba(29,26,20,0.15)",whiteSpace:"nowrap",pointerEvents:"none",letterSpacing:"0.1em"}}>{undoToast}</div>}
    </div>
  </TC.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("/life-os/sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
