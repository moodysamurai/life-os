              {WDEFS.filter(w=>!["entropy","embed","radar"].includes(w.id)).map(w=>{const act=page===w.id;return <button key={w.id} className="nav-item" onClick={()=>setPage(page===w.id?null:w.id)} style={{background:act?wc[w.id]+"18":"transparent",border:`1px solid ${act?wc[w.id]+"55":alpha(T.border,.38)}`,borderRadius:20,padding:"3px 10px",cursor:"pointer",color:act?wc[w.id]:T.textMd,fontSize:11,fontFamily:F,fontWeight:act?700:500,transition:"all 0.15s"}}><Ico n={WICON[w.id]} size={12}/> {WLABEL[w.id]}</button>;})}
            </div>}
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
            {!isMobile&&<button onClick={()=>setSearchOpen(true)} title="Ctrl+K" style={{background:T.cardAlt,border:`1px solid ${T.border}`,borderRadius:7,padding:"4px 10px",cursor:"pointer",color:T.textMd,fontSize:11,fontFamily:F,display:"flex",alignItems:"center",gap:5}}><Ico n="magnifying-glass" size={13}/> <span style={{fontSize:9,opacity:0.7}}>⌘K</span></button>}
            <Btn small onClick={()=>setModal({type:"apikey"})} style={{fontSize:10,color:apiKey?T.mint:T.text}}><Ico n="key" size={13}/>{apiKey?"✓":""}</Btn>
            <Btn small onClick={()=>setShowSyncModal(true)} title={syncGistId?"Cloud sync active — click to manage":"Enable cloud sync"} style={{fontSize:11,color:syncStatus==="ok"?T.mint:syncStatus==="err"?"#f87171":syncStatus==="loading"?"#fbbf24":T.textMd,transition:"color 0.3s"}}>
              {syncStatus==="loading"?<Ico n="arrow-clockwise" size={13}/>:syncGistId?<><Ico n="cloud-check" size={13}/>{" ✓"}</>:<Ico n="cloud-arrow-up" size={13}/>}
            </Btn>
            <Btn small onClick={()=>setShowAppleCal(true)} title={appleCal.enabled?"Apple Calendar synced — click to manage":"Connect Apple Calendar"} style={{fontSize:11,color:appleStatus==="ok"?"#FA243C":appleStatus==="err"?"#f87171":appleStatus==="loading"?"#fbbf24":T.textMd,transition:"color 0.3s"}}>
              <Ico n={appleCal.enabled?"calendar-check":"calendar-plus"} size={13}/>
            </Btn>
            <Btn small onClick={()=>setShowColorPanel(true)} title="Custom palette" style={{fontSize:11}}><Ico n="palette" size={13}/></Btn>
            <Btn small onClick={()=>setShowCapture(c=>!c)} active={showCapture} title="Quick capture"><Ico n="plus" size={13}/></Btn>
            <Btn small onClick={()=>setCustomizing(c=>!c)} active={customizing}><Ico n="sliders-horizontal" size={13}/></Btn>
            {!isMobile&&<Btn small onClick={exportJSON} style={{fontSize:10}}>⬇</Btn>}
            {!isMobile&&<Btn small onClick={importJSON} style={{fontSize:10}}>⬆</Btn>}
            {!isMobile&&<Btn small primary onClick={exportICS} style={{fontSize:10}}>📅</Btn>}
          </div>
        </div>
      </header>

      {/* DAILY BRIEF */}
      <GreetingHeader tasks={tasks} trips={trips} goals={goals} appleEvents={appleEvents}/>



      {/* CAPTURE OVERLAY */}
      {showCapture&&<div onClick={e=>e.target===e.currentTarget&&setShowCapture(false)} className="overlay-in" style={{position:"fixed",inset:0,zIndex:300,backdropFilter:"blur(14px) brightness(0.6)",WebkitBackdropFilter:"blur(14px) brightness(0.6)",display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"22vh"}}>
        <div className="modal-pop" style={{background:T.card,border:`1px solid ${alpha(T.border,.8)}`,borderRadius:16,width:"90%",maxWidth:520,padding:"1.1rem",boxShadow:"0 32px 80px rgba(0,0,0,.8)"}}>
          <div style={{fontSize:9,fontWeight:700,color:T.textLt,fontFamily:F,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:10}}>Quick Capture</div>
          <QuickCapture captureRef={captureRef} setTasks={setTasks} setTrips={setTrips} setGoals={setGoals} setModal={setModal} onClose={()=>setShowCapture(false)} inline/>
        </div>
      </div>}
      {/* CUSTOMIZE */}
      {customizing&&<CustomizePanel widgets={widgets} setWidgets={setWidgets} onResetLayout={()=>setLayout(DEFAULT_LAYOUT)} onClose={()=>setCustomizing(false)} onOpenColors={()=>setShowColorPanel(true)}/>}

      {/* CONTENT */}
      <main style={{padding:isMobile?"0.55rem 0.75rem":"0.55rem 1.5rem"}}>
        {page?(
          <div key={page} className="fade-up">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9,paddingBottom:8,borderBottom:`1px solid ${T.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <button onClick={()=>setPage(null)} className="nav-btn" style={{background:"transparent",border:"none",cursor:"pointer",color:T.textMd,fontSize:11,fontFamily:F,padding:0,display:"flex",alignItems:"center",gap:3}}>← Back</button>
                <span style={{color:T.border,fontSize:10}}>│</span>
                <span style={{fontFamily:F,fontWeight:700,fontSize:16,letterSpacing:"-0.3px",color:wc[page],display:"flex",alignItems:"center",gap:6}}><Ico n={WICON[page]} size={15}/> {WLABEL[page]}</span>
              </div>
              {addAction(page)}
            </div>
            <Card lift={false} style={{padding:"0.9rem"}}>{widgetBody(page,true)}</Card>
          </div>
        ):visible.length===0?(
          <div style={{textAlign:"center",padding:"60px 0",color:T.textLt}}>
            <div style={{fontSize:28,marginBottom:8}}>⊞</div>
            <div style={{fontFamily:F,fontSize:14}}>No widgets visible — click ⊞ to customize</div>
          </div>
        ):(
          <div ref={gridRef} style={isMobile
            ?{display:"flex",flexDirection:"column",gap:`${GGAP}px`,position:"relative"}
            :{display:"grid",gridTemplateColumns:`repeat(${GCOLS},1fr)`,gridAutoRows:`${GROW_H}px`,gap:`${GGAP}px`,position:"relative",cursor:activeDragId?"grabbing":activeResizeId?"none":"default"}}>
            {/* Drop ghost shown while dragging */}
            {!isMobile&&ghostDisplay&&<div style={{gridColumn:`${ghostDisplay.col}/span ${ghostDisplay.cS}`,gridRow:`${ghostDisplay.row}/span ${ghostDisplay.rS}`,borderRadius:10,background:T.mint,opacity:0.14,border:`2px dashed ${T.mint}`,pointerEvents:"none",zIndex:5}}/>}
            {visible.map((w,wi)=>{
              const l=layout[w.id]||DEFAULT_LAYOUT[w.id]||{col:1,row:1,cS:2,rS:4};
              const isHov=hoveredWidget===w.id;
              const isDrag=activeDragId===w.id;
              const isRes=activeResizeId===w.id;
              const isMin=minimised.has(w.id);
              const mobileH=isMin?"auto":`${l.rS*GROW_H+(l.rS-1)*GGAP}px`;
              const enterDelay=wi*55;
              const isHeadless=w.id==="calendar"||w.id==="kanban";
              return <FadeIn key={w.id} delay={enterDelay} style={isMobile
                  ?{position:"relative",width:"100%",height:mobileH,minHeight:0}
                  :{gridColumn:`${l.col}/span ${l.cS}`,gridRow:`${l.row}/span ${isMin?1:l.rS}`,position:"relative",minHeight:0,
                    opacity:isDrag?0.38:undefined,transition:isDrag||isRes?"none":undefined,zIndex:isDrag||isRes?10:1}}
                  >
              <div
                draggable={false}
                onDragStart={e=>e.preventDefault()}
                style={{height:"100%",position:"relative"}}
                onMouseEnter={()=>!isMobile&&setHoveredWidget(w.id)}
                onMouseLeave={()=>!isMobile&&!activeResizeId&&!activeDragId&&setHoveredWidget(null)}
              >
                <Card lift={false} glass={true} style={{height:isMin?"auto":"100%",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",...(isHeadless?{padding:"0.3rem"}:{}),
                  boxShadow:!isMobile&&(isRes?`0 0 0 2px ${T.mint}55`:isDrag?`0 12px 40px rgba(0,0,0,.5)`:isHov?`0 6px 24px rgba(0,0,0,.3)`:"0 2px 12px rgba(0,0,0,.18)"),transition:"box-shadow 0.22s"}}>
                  {isHeadless?(
                    /* Headless: float drag + minimise as invisible overlay, no flow cost */
                    <div style={{position:"absolute",top:5,right:6,left:6,display:"flex",justifyContent:"space-between",alignItems:"center",zIndex:6,pointerEvents:"none"}}>
                      {!isMobile&&<div onMouseDown={e=>startDrag(e,w.id)} title="Drag to move"
                        style={{cursor:isDrag?"grabbing":"grab",padding:"3px 7px",color:T.textLt,fontSize:11,
                          userSelect:"none",opacity:isHov||isDrag?0.65:0,transition:"opacity 0.15s",touchAction:"none",pointerEvents:isHov||isDrag?"all":"none",background:alpha(T.card,.85),borderRadius:6}}>⠿</div>}
                      <span style={{flex:1}}/>
                      <button onClick={()=>toggleMin(w.id)} title={isMin?"Expand":"Collapse"}
                        style={{background:alpha(T.card,.85),border:"none",cursor:"pointer",color:T.textLt,fontSize:10,
                          padding:"2px 7px",opacity:isHov||isMin?0.72:0,transition:"opacity 0.15s",lineHeight:1,borderRadius:5,pointerEvents:isHov||isMin?"all":"none"}}>
                        {isMin?"▽":"△"}
                      </button>
                    </div>
                  ):(
                    <div style={{display:"flex",alignItems:"center",flexShrink:0,gap:2}}>
                      {!isMobile&&<div onMouseDown={e=>startDrag(e,w.id)} title="Drag to move"
                        style={{cursor:isDrag?"grabbing":"grab",padding:"2px 5px",color:T.textLt,fontSize:12,
                          userSelect:"none",opacity:isHov||isDrag?0.65:0,transition:"opacity 0.15s",flexShrink:0,touchAction:"none"}}>⠿</div>}
                      <div style={{flex:1,minWidth:0}}><WidgetHead id={w.id} title={WLABEL[w.id]} icon={WICON[w.id]} onPage={()=>!isDrag&&!["entropy","embed","radar"].includes(w.id)&&setPage(w.id)} action={addAction(w.id)}/></div>
                      <button onClick={()=>toggleMin(w.id)} title={isMin?"Expand":"Collapse"}
                        style={{background:"transparent",border:"none",cursor:"pointer",color:T.textLt,fontSize:10,
                          padding:"2px 6px",opacity:isMobile?0.6:isHov||isMin?0.7:0,transition:"opacity 0.15s",flexShrink:0,lineHeight:1}}>
                        {isMin?"▽":"△"}
                      </button>
                    </div>
                  )}
                  {!isMin&&(isHeadless
                    ?<div style={{flex:1,overflow:"auto",minHeight:0,paddingTop:1,display:"flex",flexDirection:"column"}}>{widgetBody(w.id,false)}</div>
                    :<div style={{flex:1,overflow:"auto",minHeight:0,paddingTop:10}}>{widgetBody(w.id,false)}</div>
                  )}
                </Card>
                {!isMobile&&!isMin&&(isHov||isRes)&&<div onMouseDown={e=>startResize(e,w.id,'h')} style={{position:"absolute",right:1,top:"50%",transform:"translateY(-50%)",cursor:"col-resize",zIndex:20,display:"flex",flexDirection:"column",gap:"3px",padding:"5px 4px",touchAction:"none",opacity:isRes?1:0.5}}>
                  {[0,1,2].map(i=><div key={i} style={{width:3,height:3,borderRadius:"50%",background:alpha(T.text,.5)}}/>)}
                </div>}
                {!isMobile&&!isMin&&(isHov||isRes)&&<div onMouseDown={e=>startResize(e,w.id,'v')} style={{position:"absolute",bottom:1,left:"50%",transform:"translateX(-50%)",cursor:"row-resize",zIndex:20,display:"flex",flexDirection:"row",gap:"3px",padding:"4px 5px",touchAction:"none",opacity:isRes?1:0.5}}>
                  {[0,1,2].map(i=><div key={i} style={{width:3,height:3,borderRadius:"50%",background:alpha(T.text,.5)}}/>)}
                </div>}
                {!isMobile&&!isMin&&(isHov||isRes)&&<div onMouseDown={e=>startResize(e,w.id,'hv')} style={{position:"absolute",right:1,bottom:1,cursor:"nwse-resize",zIndex:21,display:"flex",flexDirection:"column",gap:"2px",padding:"3px",touchAction:"none",opacity:isRes?1:0.5}}>
                  <div style={{display:"flex",gap:"2px",justifyContent:"flex-end"}}><div style={{width:3,height:3,borderRadius:"50%",background:alpha(T.text,.5)}}/><div style={{width:3,height:3,borderRadius:"50%",background:alpha(T.text,.5)}}/></div>
                  <div style={{display:"flex",gap:"2px",justifyContent:"flex-end"}}><div style={{width:3,height:3,borderRadius:"50%",background:alpha(T.text,.5)}}/></div>
                </div>}
              </div>
              </FadeIn>;
            })}
          </div>
        )}
        <div style={{marginTop:14,textAlign:"center",fontSize:9,color:T.textLt,fontFamily:F,letterSpacing:"0.03em"}}>
          {isMobile
            ?"tap ▽ to collapse widgets · tap widget title to expand"
            :"/ or space → capture · n/t/g → new task/trip/goal · ⌘K → search · Esc → back · ⠿ drag header to move · drag edges/corner to resize"}
        </div>
      </main>

      {/* MODALS */}
      {modal?.type==="task"   &&<TaskModal   data={modal.data} setTasks={setTasks} onClose={()=>setModal(null)}/>}
      {modal?.type==="trip"   &&<TripModal   data={modal.data} setTrips={setTrips} onClose={()=>setModal(null)}/>}
      {modal?.type==="goal"   &&<GoalModal   data={modal.data} setGoals={setGoals} onClose={()=>setModal(null)}/>}
      {modal?.type==="apikey" &&<ApiKeyModal current={apiKey} onClose={()=>setModal(null)} onSave={k=>{setApiKey(k);setModal(null);}}/>}
      {focusDay&&<FocusDayModal day={focusDay} tasks={tasks} completions={completions} setCompletions={setCompletions} setTasks={setTasks} scratchpads={scratchpads} setScratchpads={setScratchpads} onClose={()=>setFocusDay(null)}/>}
      {searchOpen&&<SearchModal tasks={tasks} trips={trips} goals={goals} onClose={()=>setSearchOpen(false)} setModal={setModal} setPage={setPage}/>}
      {showAppleCal&&<AppleCalModal cfg={appleCal} onSave={c=>{setAppleCal(c);setShowAppleCal(false);}} onClose={()=>setShowAppleCal(false)}/>}
      {showColorPanel&&<ColorCustomizePanel palette={palette} bgPalette={bgPalette}
        onApply={(p,bp)=>{setPalette(p);if(bp){setBgPalette(bp);ls("plo3_bgpal",bp);}setShowColorPanel(false);}}
        onClose={()=>setShowColorPanel(false)}/>}

      {showSyncModal&&<SyncModal
        onClose={()=>setShowSyncModal(false)}
        syncToken={syncToken} setSyncToken={setSyncToken}
        syncGistId={syncGistId} setSyncGistId={setSyncGistId}
        onConnect={data=>{
          const setters={setTasks,setTrips,setGoals,setCompletions,setNotes,setScratchpads,setBingo};
          applyGistData(data,setters);
          setSyncStatus("ok");
          syncReadyRef.current=true;
        }}
      />}
      {/* UNDO TOAST */}
      {undoToast&&<div className="fade-up" style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:T.card,border:`1px solid ${T.mint}44`,borderRadius:10,padding:"8px 20px",fontSize:12,fontFamily:F,color:T.text,zIndex:600,boxShadow:"0 4px 24px rgba(0,0,0,.5)",whiteSpace:"nowrap",pointerEvents:"none"}}>{undoToast}</div>}
    </div>
  </TC.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("/life-os/sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
