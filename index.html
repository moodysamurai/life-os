function App(){
  const [theme,setTheme]=useState(()=>lg("plo3_theme","dark"));
  const [palette,setPalette]=useState(()=>lg("plo3_palette",DEFAULT_PALETTE));
  function cycleTheme(){
    const idx=THEME_PRESETS.findIndex(p=>p.name===theme);
    const next=THEME_PRESETS[(idx+1)%THEME_PRESETS.length];
    setTheme(next.name);setPalette(next.palette);
  }
  const activePreset=THEME_PRESETS.find(p=>p.name===theme)||THEME_PRESETS[0];
  const T=useMemo(()=>activePreset.mode==="dark"?buildDark(palette):buildLight(palette),[activePreset,palette]);

  const [widgets,setWidgets]=useState(()=>{
    const s=lg("plo3_widgets",null);
    return s?WDEFS.map(d=>({...d,...(s.find(w=>w.id===d.id)||{})})):WDEFS;
  });
  const [layout,setLayout]=useState(()=>{const s=lg("plo3_layout",null);return s?{...DEFAULT_LAYOUT,...s}:DEFAULT_LAYOUT;});
  const [minimised,setMinimised]=useState(()=>new Set(lg("plo3_minimised",[])));
  const toggleMin=id=>setMinimised(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  const [isMobile,setIsMobile]=useState(()=>window.innerWidth<768);
  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  const [tasks,setTasks]=useState(()=>lg("plo3_tasks",[]));
  const [trips,setTrips]=useState(()=>lg("plo3_trips",[]));
  const [goals,setGoals]=useState(()=>lg("plo3_goals",[]));
  const [bingo,setBingo]=useState(()=>lg("plo3_bingo",DEFAULT_BINGO));
  const [completions,setCompletions]=useState(()=>lg("plo3_completions",{}));
  const [notes,setNotes]=useState(()=>lg("plo3_notes",[]));
  const [photos,setPhotos]=useState(()=>lg("plo3_photos",{}));
  const [scratchpads,setScratchpads]=useState(()=>lg("plo3_scratchpads",{}));
  const [apiKey,setApiKey]=useState(()=>lg("plo3_apikey",""));
  const [zoom,setZoom]=useState(()=>lg("plo3_zoom",1));

  // ── Cloud sync ──
  const [syncToken,setSyncToken]=useState(()=>lg("plo3_sync_token",""));
  const [syncGistId,setSyncGistId]=useState(()=>lg("plo3_sync_gist",""));
  const [syncStatus,setSyncStatus]=useState("idle"); // idle|loading|ok|err
  const [showSyncModal,setShowSyncModal]=useState(false);
  const [showWeeklyReview,setShowWeeklyReview]=useState(false);
  const isSunday=new Date().getDay()===0;
  const syncTimerRef=useRef(null);
  const syncReadyRef=useRef(false); // prevents push before initial load
  const undoStackRef=useRef([]);
  const [undoToast,setUndoToast]=useState(null);
  const pushUndo=action=>{undoStackRef.current=[...undoStackRef.current.slice(-9),action];};
  function doUndo(){
    const action=undoStackRef.current.pop();
    if(!action) return;
    const label=action.payload.title||action.payload.destination||"item";
    if(action.type==="DELETE_TASK") setTasks(p=>[action.payload,...p]);
    if(action.type==="DELETE_TRIP") setTrips(p=>[action.payload,...p]);
    if(action.type==="DELETE_GOAL") setGoals(p=>[action.payload,...p]);
    setUndoToast(`↩ Restored: ${label}`);
    clearTimeout(undoStackRef._t);
    undoStackRef._t=setTimeout(()=>setUndoToast(null),2500);
  }

  const [page,setPage]=useState(null);
  const [customizing,setCustomizing]=useState(false);
  const [showColorPanel,setShowColorPanel]=useState(false);
  const [modal,setModal]=useState(null);
  const [focusDay,setFocusDay]=useState(null);
  const [searchOpen,setSearchOpen]=useState(false);
  const [tripSugg,setTripSugg]=useState({});
  const [loadingSugg,setLoadingSugg]=useState(null);
  const captureRef=useRef(null);

  // ── 2D layout state ──
  const gridRef=useRef(null);
  const [hoveredWidget,setHoveredWidget]=useState(null);
  const [ghostDisplay,setGhostDisplay]=useState(null);    // {col,row,cS,rS}
  const [activeDragId,setActiveDragId]=useState(null);
  const [activeResizeId,setActiveResizeId]=useState(null);
  const dragRef=useRef(null);    // {id,cS,rS}
  const ghostRef=useRef(null);   // mirrors ghostDisplay for mouseup handler
  const resizeRef=useRef(null);  // {id,type,startMouse,startLayout}

  useEffect(()=>ls("plo3_theme",theme),[theme]);
  useEffect(()=>ls("plo3_palette",palette),[palette]);
  useEffect(()=>ls("plo3_widgets",widgets),[widgets]);
  useEffect(()=>ls("plo3_layout",layout),[layout]);
  useEffect(()=>ls("plo3_minimised",[...minimised]),[minimised]);
  useEffect(()=>ls("plo3_tasks",tasks),[tasks]);
  useEffect(()=>ls("plo3_trips",trips),[trips]);
  useEffect(()=>ls("plo3_goals",goals),[goals]);
  useEffect(()=>ls("plo3_bingo",bingo),[bingo]);
  useEffect(()=>ls("plo3_completions",completions),[completions]);
  useEffect(()=>ls("plo3_notes",notes),[notes]);
  useEffect(()=>ls("plo3_photos",photos),[photos]);
  useEffect(()=>ls("plo3_scratchpads",scratchpads),[scratchpads]);
  useEffect(()=>ls("plo3_apikey",apiKey),[apiKey]);
  useEffect(()=>ls("plo3_zoom",zoom),[zoom]);
  useEffect(()=>ls("plo3_sync_token",syncToken),[syncToken]);
  useEffect(()=>ls("plo3_sync_gist",syncGistId),[syncGistId]);

  // Load from Gist on mount
  useEffect(()=>{
    if(!syncToken||!syncGistId){syncReadyRef.current=true;return;}
    setSyncStatus("loading");
    const setters={setTasks,setTrips,setGoals,setCompletions,setNotes,setScratchpads,setBingo};
    gistFetch(syncToken,syncGistId)
      .then(data=>{applyGistData(data,setters);setSyncStatus("ok");})
      .catch(()=>setSyncStatus("err"))
      .finally(()=>{syncReadyRef.current=true;});
  },[]);// eslint-disable-line

  // Auto-push on data changes (debounced 2.5s)
  useEffect(()=>{
    if(!syncReadyRef.current||!syncToken||!syncGistId)return;
    clearTimeout(syncTimerRef.current);
    setSyncStatus("loading");
    syncTimerRef.current=setTimeout(()=>{
      // photos excluded — base64 images are too large for Gist; they persist in localStorage per device
      const payload={tasks,trips,goals,bingo,completions,notes,scratchpads};
      gistPush(syncToken,syncGistId,payload)
        .then(()=>setSyncStatus("ok"))
        .catch(()=>setSyncStatus("err"));
    },2500);
    return()=>clearTimeout(syncTimerRef.current);
  },[tasks,trips,goals,bingo,completions,notes,scratchpads]);// eslint-disable-line

  // Keyboard shortcuts
  useEffect(()=>{
    function onKey(e){
      const tag=e.target.tagName;
      if(tag==="INPUT"||tag==="TEXTAREA"){if(e.key==="Escape"){e.target.blur();}return;}
      if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();setSearchOpen(true);return;}
      if((e.ctrlKey||e.metaKey)&&e.key==="z"){e.preventDefault();doUndo();return;}
      if(modal||searchOpen||focusDay) return;
      if(e.key==="n") setModal({type:"task"});
      if(e.key==="t") setModal({type:"trip"});
      if(e.key==="g") setModal({type:"goal"});
      if(e.key==="/"||e.key===" "){e.preventDefault();setTimeout(()=>captureRef.current?.focus(),30);}
      if(e.key==="Escape"){setPage(null);}
    }
    window.addEventListener("keydown",onKey);return()=>window.removeEventListener("keydown",onKey);
  },[modal,searchOpen,focusDay]);

  // ── 2D drag + resize handlers (ref-based, single registration) ──
  function mouseToCell(e){
    if(!gridRef.current)return{col:1,row:1};
    const rect=gridRef.current.getBoundingClientRect();
    const cellW=(rect.width-(GCOLS-1)*GGAP)/GCOLS;
    const x=Math.max(0,e.clientX-rect.left);
    const y=Math.max(0,e.clientY-rect.top);
    return{col:Math.max(1,Math.min(GCOLS,Math.floor(x/(cellW+GGAP))+1)),
           row:Math.max(1,Math.floor(y/(GROW_H+GGAP))+1)};
  }
  function startDrag(e,id){
    e.preventDefault();e.stopPropagation();
    setLayout(p=>{const l=p[id]||DEFAULT_LAYOUT[id];dragRef.current={id,cS:l.cS,rS:l.rS};return p;});
    setActiveDragId(id);setGhostDisplay(null);ghostRef.current=null;
  }
  function startResize(e,id,type){
    e.preventDefault();e.stopPropagation();
    setLayout(p=>{const l=p[id]||DEFAULT_LAYOUT[id];resizeRef.current={id,type,startMouse:{x:e.clientX,y:e.clientY},startLayout:{...l}};return p;});
    setActiveResizeId(id);
  }
  useEffect(()=>{
    function onMove(e){
      if(dragRef.current){
        const {id,cS,rS}=dragRef.current;
        const cell=mouseToCell(e);
        const col=Math.max(1,Math.min(GCOLS-cS+1,cell.col));
        const row=Math.max(1,cell.row);
        const g={col,row,cS,rS};
        ghostRef.current=g;setGhostDisplay(g);
      } else if(resizeRef.current&&gridRef.current){
        const rect=gridRef.current.getBoundingClientRect();
        const cellW=(rect.width-(GCOLS-1)*GGAP)/GCOLS;
        const {id,type,startMouse,startLayout:sl}=resizeRef.current;
        const dC=Math.round((e.clientX-startMouse.x)/(cellW+GGAP));
        const dR=Math.round((e.clientY-startMouse.y)/(GROW_H+GGAP));
        setLayout(p=>{
          const l={...sl};
          if(type==='h'||type==='hv') l.cS=Math.max(1,Math.min(GCOLS-sl.col+1,sl.cS+dC));
          if(type==='v'||type==='hv') l.rS=Math.max(2,sl.rS+dR);
          return resolveCollisions({...p,[id]:l},id);
        });
      }
    }
    function onUp(){
      if(dragRef.current){
        const {id}=dragRef.current;
        const g=ghostRef.current;
        dragRef.current=null;ghostRef.current=null;
        setActiveDragId(null);setGhostDisplay(null);
        if(g) setLayout(p=>resolveCollisions({...p,[id]:{...p[id],col:g.col,row:g.row}},id));
      } else if(resizeRef.current){
        resizeRef.current=null;setActiveResizeId(null);
      }
    }
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
    return()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
  },[]);

  async function getTripSugg(trip){
    if(!apiKey){setModal({type:"apikey"});return;}
    setLoadingSugg(trip.id);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`Give 6 curated things to do in ${trip.destination} (${trip.startDate} to ${trip.endDate}). Mix hidden gems, local food, culture. Raw JSON only, no markdown: [{"category":"Food","name":"...","tip":"one sentence"}]`}]})});
      const data=await res.json();
      const text=data.content?.find(c=>c.type==="text")?.text||"[]";
      setTripSugg(p=>({...p,[trip.id]:JSON.parse(text.replace(/```json|```/g,"").trim())}));
    }catch{setTripSugg(p=>({...p,[trip.id]:[{category:"Note",name:"Could not generate",tip:"Check your API key"}]}));}
    setLoadingSugg(null);
  }

  function exportICS(){
    const f=s=>s.replace(/-/g,"");
    let cal="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Pratham Life OS//EN\r\nCALSCALE:GREGORIAN\r\n";
    tasks.forEach(t=>{cal+=`BEGIN:VEVENT\r\nUID:wakuli-${t.id}@plo\r\nDTSTART;VALUE=DATE:${f(t.deadline)}\r\nDTEND;VALUE=DATE:${f(t.deadline)}\r\nSUMMARY:[Wakuli] ${t.title}\r\nEND:VEVENT\r\n`;});
    trips.forEach(t=>{cal+=`BEGIN:VEVENT\r\nUID:trip-${t.id}@plo\r\nDTSTART;VALUE=DATE:${f(t.startDate)}\r\nDTEND;VALUE=DATE:${f(t.endDate)}\r\nSUMMARY:✈ ${t.destination}\r\nEND:VEVENT\r\n`;});
    goals.forEach(g=>{if(!g.targetDate)return;cal+=`BEGIN:VEVENT\r\nUID:goal-${g.id}@plo\r\nDTSTART;VALUE=DATE:${f(g.targetDate)}\r\nDTEND;VALUE=DATE:${f(g.targetDate)}\r\nSUMMARY:[Goal] ${g.title}\r\nEND:VEVENT\r\n`;});
    cal+="END:VCALENDAR";
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([cal],{type:"text/calendar"}));a.download="pratham-2026.ics";document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  function exportJSON(){
    const payload={tasks,trips,goals,completions,notes,bingo,photos,scratchpads,layout};
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:"application/json"}));a.download="pratham-life-os-backup.json";document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  function importJSON(){
    const inp=document.createElement("input");inp.type="file";inp.accept=".json";
    inp.onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{
      const d=JSON.parse(ev.target.result);
      if(d.tasks)       setTasks(d.tasks);
      if(d.trips)       setTrips(d.trips);
      if(d.goals)       setGoals(d.goals);
      if(d.completions) setCompletions(d.completions);
      if(d.notes)       setNotes(d.notes);
      if(d.bingo)       setBingo(d.bingo);
      if(d.photos)      setPhotos(d.photos);
      if(d.scratchpads) setScratchpads(d.scratchpads);
      if(d.layout)      setLayout(d.layout);
      alert("✅ Restored!");
    }catch{alert("❌ Invalid file");}};r.readAsText(file);};
    document.body.appendChild(inp);inp.click();document.body.removeChild(inp);
  }

  const visible=widgets.filter(w=>w.visible);
  const wc=WCOL(T);

  function addAction(id){
    if(id==="wakuli"||id==="kanban") return <Btn small primary onClick={()=>setModal({type:"task"})}>+ Task</Btn>;
    if(id==="trips") return <Btn small primary onClick={()=>setModal({type:"trip"})}>+ Trip</Btn>;
    if(id==="goals") return <Btn small primary onClick={()=>setModal({type:"goal"})}>+ Goal</Btn>;
    return null;
  }

  function widgetBody(id,pageMode=false){
    switch(id){
      case "calendar": return <CalendarWidget tasks={tasks} trips={trips} goals={goals} completions={completions} pageMode={pageMode}/>;
      case "wakuli":   return <WakuliWidget tasks={tasks} setTasks={setTasks} onAddTask={()=>setModal({type:"task"})} onEditTask={t=>setModal({type:"task",data:t})} pushUndo={pushUndo} pageMode={pageMode}/>;
      case "kanban":   return <KanbanWidget tasks={tasks} completions={completions} setCompletions={setCompletions} onAddTask={()=>setModal({type:"task"})} onFocusDay={setFocusDay} pageMode={pageMode}/>;
      case "trips":    return <TripsWidget trips={trips} setTrips={setTrips} photos={photos} setPhotos={setPhotos} onAddTrip={()=>setModal({type:"trip"})} tripSugg={tripSugg} getTripSugg={getTripSugg} loadingSugg={loadingSugg} pushUndo={pushUndo} pageMode={pageMode}/>;
      case "goals":    return <GoalsWidget goals={goals} setGoals={setGoals} onAddGoal={()=>setModal({type:"goal"})} pageMode={pageMode} bingo={bingo} setBingo={setBingo} pushUndo={pushUndo} apiKey={apiKey}/>;

      case "entropy":  return <EntropyWidget apiKey={apiKey} goals={goals} trips={trips} pageMode={pageMode}/>;
      case "radar":    return <ResearchRadarWidget apiKey={apiKey} pageMode={pageMode}/>;
      case "embed":    return <EmbedWidget pageMode={pageMode}/>;
      case "projects": return <ProjectsWidget pageMode={pageMode}/>;

      default: return null;
    }
  }

  const WLABEL={calendar:"Calendar",wakuli:"Wakuli",kanban:"Week",trips:"Trips",goals:"Goals",entropy:"Entropy",radar:"Radar",embed:"Embed",projects:"Projects"};
  const WICON={calendar:"◷",wakuli:"◈",kanban:"▦",trips:"◎",goals:"◉",entropy:"✦",radar:"🔭",embed:"⧉",projects:"⊞"};

  return <TC.Provider value={T}>
    <div className={`theme-${theme}`} style={{minHeight:"100vh",background:T.bg,fontFamily:F,color:T.text,userSelect:activeDragId||activeResizeId?"none":"auto",zoom:zoom}}>

      {/* HEADER */}
      <header style={{background:T.card,borderBottom:`1px solid ${T.border}`,padding:"7px 1rem",position:"sticky",top:0,zIndex:100,boxShadow:T.isDark?"0 1px 20px rgba(0,0,0,.5)":"0 1px 12px rgba(0,0,0,.08)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:2}}>
            <button onClick={()=>setPage(null)} style={{background:"transparent",border:"none",cursor:"pointer",padding:"3px 10px 3px 0",display:"flex",alignItems:"center",gap:5,color:T.text}}>
              <span style={{color:T.mint,fontSize:14,fontWeight:700,letterSpacing:"-1px"}}>◈</span>
              <span style={{fontFamily:F,fontSize:13,fontWeight:700,letterSpacing:"-0.3px"}}>Life OS</span>
            </button>
            {!isMobile&&<div style={{display:"flex",gap:1,flexWrap:"wrap"}}>
              {WDEFS.map(w=>{const act=page===w.id;return <button key={w.id} onClick={()=>setPage(page===w.id?null:w.id)} style={{background:act?wc[w.id]+"18":"transparent",border:`1px solid ${act?wc[w.id]+"45":"transparent"}`,borderRadius:6,padding:"3px 8px",cursor:"pointer",color:act?wc[w.id]:T.textMd,fontSize:11,fontFamily:F,fontWeight:act?700:500,transition:"all 0.1s"}}>{WICON[w.id]} {WLABEL[w.id]}</button>;})}
            </div>}
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
            {!isMobile&&<button onClick={()=>setSearchOpen(true)} title="Ctrl+K" style={{background:T.cardAlt,border:`1px solid ${T.border}`,borderRadius:7,padding:"4px 10px",cursor:"pointer",color:T.textMd,fontSize:11,fontFamily:F,display:"flex",alignItems:"center",gap:5}}>⌕ <span style={{fontSize:9,opacity:0.7}}>⌘K</span></button>}
            {!isMobile&&<div style={{display:"flex",alignItems:"center",gap:5,padding:"2px 7px",background:T.cardAlt,border:`1px solid ${T.border}`,borderRadius:7}} title="Page zoom">
              <span style={{fontSize:9,color:T.textLt,fontFamily:F,userSelect:"none"}}>A</span>
              <input type="range" min={0.7} max={1.35} step={0.05} value={zoom}
                onChange={e=>setZoom(+e.target.value)}
                style={{width:52,cursor:"pointer",accentColor:T.mint,margin:0}}/>
              <span style={{fontSize:12,color:T.textLt,fontFamily:F,userSelect:"none"}}>A</span>
            </div>}
            <Btn small onClick={cycleTheme} title={`Theme: ${activePreset.label} — click to cycle`} style={{fontSize:11}}>{activePreset.icon}</Btn>
            <Btn small onClick={()=>setModal({type:"apikey"})} style={{fontSize:10,color:apiKey?T.mint:T.text}}>{apiKey?"🔑✓":"🔑"}</Btn>
            <Btn small onClick={()=>setShowSyncModal(true)} title={syncGistId?"Cloud sync active — click to manage":"Enable cloud sync"} style={{fontSize:11,color:syncStatus==="ok"?T.mint:syncStatus==="err"?"#f87171":syncStatus==="loading"?"#fbbf24":T.textMd,transition:"color 0.3s"}}>
              {syncStatus==="loading"?"⟳":syncGistId?"☁✓":"☁"}
            </Btn>
            <Btn small onClick={()=>setShowWeeklyReview(true)} title="Weekly Review" style={{position:"relative",fontSize:11}}>
              ◑{isSunday&&<span style={{position:"absolute",top:1,right:1,width:5,height:5,borderRadius:"50%",background:T.mint,pointerEvents:"none"}}/>}
            </Btn>
            <Btn small onClick={()=>setCustomizing(c=>!c)} active={customizing}>⊞</Btn>
            {!isMobile&&<Btn small onClick={exportJSON} style={{fontSize:10}}>⬇</Btn>}
            {!isMobile&&<Btn small onClick={importJSON} style={{fontSize:10}}>⬆</Btn>}
            {!isMobile&&<Btn small primary onClick={exportICS} style={{fontSize:10}}>📅</Btn>}
          </div>
        </div>
      </header>

      {/* DAILY BRIEF */}
      <DailyBrief tasks={tasks} trips={trips} goals={goals}/>

      {/* QUICK CAPTURE */}
      <QuickCapture captureRef={captureRef} setTasks={setTasks} setTrips={setTrips} setGoals={setGoals} setModal={setModal}/>

      {/* CUSTOMIZE */}
      {customizing&&<CustomizePanel widgets={widgets} setWidgets={setWidgets} onResetLayout={()=>setLayout(DEFAULT_LAYOUT)} onClose={()=>setCustomizing(false)} onOpenColors={()=>setShowColorPanel(true)}/>}

      {/* CONTENT */}
      <main style={{padding:isMobile?"0.55rem 0.75rem":"0.55rem 1.5rem"}}>
        {page?(
          <div key={page} className="fade-up">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9,paddingBottom:8,borderBottom:`1px solid ${T.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <button onClick={()=>setPage(null)} className="nav-btn" style={{background:"transparent",border:"none",cursor:"pointer",color:T.textMd,fontSize:11,fontFamily:F,padding:0,display:"flex",alignItems:"center",gap:3}}>← Back</button>
                <span style={{color:T.border,fontSize:10}}>│</span>
                <span style={{fontFamily:F,fontWeight:700,fontSize:16,letterSpacing:"-0.3px",color:wc[page]}}>{WICON[page]} {WLABEL[page]}</span>
              </div>
              {addAction(page)}
            </div>
            <Card lift={false} style={{padding:"0.9rem"}}>{widgetBody(page,true)}</Card>
          </div>
        ):visible.length===0?(
          <div style={{textAlign:"center",padding:"60px 0",color:T.textLt}}>
            <div style={{fontSize:28,marginBottom:8}}>⊞</div>
            <div style={{fontFamily:F,fontSize:14}}>No widgets visible — click ⊞ to customize</div>
          </div>
        ):(
          <div ref={gridRef} style={isMobile
            ?{display:"flex",flexDirection:"column",gap:`${GGAP}px`,position:"relative"}
            :{display:"grid",gridTemplateColumns:`repeat(${GCOLS},1fr)`,gridAutoRows:`${GROW_H}px`,gap:`${GGAP}px`,position:"relative",cursor:activeDragId?"grabbing":activeResizeId?"none":"default"}}>
            {/* Drop ghost shown while dragging */}
            {!isMobile&&ghostDisplay&&<div style={{gridColumn:`${ghostDisplay.col}/span ${ghostDisplay.cS}`,gridRow:`${ghostDisplay.row}/span ${ghostDisplay.rS}`,borderRadius:10,background:T.mint,opacity:0.14,border:`2px dashed ${T.mint}`,pointerEvents:"none",zIndex:5}}/>}
            {visible.map((w,wi)=>{
              const l=layout[w.id]||DEFAULT_LAYOUT[w.id]||{col:1,row:1,cS:2,rS:4};
              const isHov=hoveredWidget===w.id;
              const isDrag=activeDragId===w.id;
              const isRes=activeResizeId===w.id;
              const isMin=minimised.has(w.id);
              const delayClass=["fade-up","fade-up-d1","fade-up-d2","fade-up-d3"][Math.min(wi,3)];
              const mobileH=isMin?"auto":`${l.rS*GROW_H+(l.rS-1)*GGAP}px`;
              return <div
                key={w.id}
                className={delayClass}
                draggable={false}
                onDragStart={e=>e.preventDefault()}
                style={isMobile
                  ?{position:"relative",width:"100%",height:mobileH,minHeight:0}
                  :{gridColumn:`${l.col}/span ${l.cS}`,gridRow:`${l.row}/span ${isMin?1:l.rS}`,position:"relative",minHeight:0,
                    opacity:isDrag?0.38:1,transition:isDrag||isRes?"none":"opacity 0.15s",zIndex:isDrag||isRes?10:1}}
                onMouseEnter={()=>!isMobile&&setHoveredWidget(w.id)}
                onMouseLeave={()=>!isMobile&&!activeResizeId&&!activeDragId&&setHoveredWidget(null)}
              >
                <Card lift={false} style={{height:isMin?"auto":"100%",display:"flex",flexDirection:"column",overflow:"hidden",
                  boxShadow:!isMobile&&(isRes?`0 0 0 2px ${T.mint}55`:isDrag?`0 8px 32px rgba(0,0,0,.45)`:isHov?`0 4px 16px rgba(0,0,0,.25)`:"none"),transition:"box-shadow 0.18s"}}>
                  <div style={{display:"flex",alignItems:"center",flexShrink:0,gap:2}}>
                    {!isMobile&&<div onMouseDown={e=>startDrag(e,w.id)} title="Drag to move"
                      style={{cursor:isDrag?"grabbing":"grab",padding:"2px 5px",color:T.textLt,fontSize:12,
                        userSelect:"none",opacity:isHov||isDrag?0.65:0,transition:"opacity 0.15s",flexShrink:0,touchAction:"none"}}>⠿</div>}
                    <div style={{flex:1,minWidth:0}}><WidgetHead id={w.id} title={WLABEL[w.id]} icon={WICON[w.id]} onPage={()=>!isDrag&&setPage(w.id)} action={addAction(w.id)}/></div>
                    <button onClick={()=>toggleMin(w.id)} title={isMin?"Expand":"Collapse"}
                      style={{background:"transparent",border:"none",cursor:"pointer",color:T.textLt,fontSize:10,
                        padding:"2px 6px",opacity:isMobile?0.6:isHov||isMin?0.7:0,transition:"opacity 0.15s",flexShrink:0,lineHeight:1}}>
                      {isMin?"▽":"△"}
                    </button>
                  </div>
                  {!isMin&&<div style={{flex:1,overflow:"auto",minHeight:0}}>{widgetBody(w.id,false)}</div>}
                </Card>
                {!isMobile&&!isMin&&(isHov||isRes)&&<div onMouseDown={e=>startResize(e,w.id,'h')}
                  style={{position:"absolute",right:0,top:"18%",bottom:"18%",width:5,cursor:"col-resize",zIndex:20,
                    background:T.mint,opacity:isRes?0.9:0.5,borderRadius:"0 3px 3px 0",touchAction:"none"}}/>}
                {!isMobile&&!isMin&&(isHov||isRes)&&<div onMouseDown={e=>startResize(e,w.id,'v')}
                  style={{position:"absolute",bottom:0,left:"18%",right:"18%",height:5,cursor:"row-resize",zIndex:20,
                    background:T.mint,opacity:isRes?0.9:0.5,borderRadius:"0 0 3px 3px",touchAction:"none"}}/>}
                {!isMobile&&!isMin&&(isHov||isRes)&&<div onMouseDown={e=>startResize(e,w.id,'hv')}
                  style={{position:"absolute",right:0,bottom:0,width:13,height:13,cursor:"nwse-resize",zIndex:21,
                    background:T.mint,opacity:isRes?1:0.7,borderRadius:"0 0 3px 0",touchAction:"none"}}/>}
              </div>;
            })}
          </div>
        )}
        <div style={{marginTop:14,textAlign:"center",fontSize:9,color:T.textLt,fontFamily:F,letterSpacing:"0.03em"}}>
          {isMobile
            ?"tap ▽ to collapse widgets · tap widget title to expand"
            :"/ or space → capture · n/t/g → new task/trip/goal · ⌘K → search · Esc → back · ⠿ drag header to move · drag edges/corner to resize"}
        </div>
      </main>

      {/* MODALS */}
      {modal?.type==="task"   &&<TaskModal   data={modal.data} setTasks={setTasks} onClose={()=>setModal(null)}/>}
      {modal?.type==="trip"   &&<TripModal   data={modal.data} setTrips={setTrips} onClose={()=>setModal(null)}/>}
      {modal?.type==="goal"   &&<GoalModal   data={modal.data} setGoals={setGoals} onClose={()=>setModal(null)}/>}
      {modal?.type==="apikey" &&<ApiKeyModal current={apiKey} onClose={()=>setModal(null)} onSave={k=>{setApiKey(k);setModal(null);}}/>}
      {focusDay&&<FocusDayModal day={focusDay} tasks={tasks} completions={completions} setCompletions={setCompletions} setTasks={setTasks} scratchpads={scratchpads} setScratchpads={setScratchpads} onClose={()=>setFocusDay(null)}/>}
      {searchOpen&&<SearchModal tasks={tasks} trips={trips} goals={goals} onClose={()=>setSearchOpen(false)} setModal={setModal} setPage={setPage}/>}
      {showColorPanel&&<ColorCustomizePanel palette={palette} onApply={p=>{setPalette(p);setShowColorPanel(false);}} onClose={()=>setShowColorPanel(false)}/>}
      {showWeeklyReview&&<WeeklyReviewModal onClose={()=>setShowWeeklyReview(false)} tasks={tasks} completions={completions} goals={goals} trips={trips} apiKey={apiKey}/>}
      {showSyncModal&&<SyncModal
        onClose={()=>setShowSyncModal(false)}
        syncToken={syncToken} setSyncToken={setSyncToken}
        syncGistId={syncGistId} setSyncGistId={setSyncGistId}
        onConnect={data=>{
          const setters={setTasks,setTrips,setGoals,setCompletions,setNotes,setScratchpads,setBingo};
          applyGistData(data,setters);
          setSyncStatus("ok");
          syncReadyRef.current=true;
        }}
      />}
      {/* UNDO TOAST */}
      {undoToast&&<div className="fade-up" style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:T.card,border:`1px solid ${T.mint}44`,borderRadius:10,padding:"8px 20px",fontSize:12,fontFamily:F,color:T.text,zIndex:600,boxShadow:"0 4px 24px rgba(0,0,0,.5)",whiteSpace:"nowrap",pointerEvents:"none"}}>{undoToast}</div>}
    </div>
  </TC.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("/life-os/sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
