  {id:"c7",label:"Shopping",type:"expense",icon:"shopping-bag"},
  {id:"c8",label:"Travel",type:"expense",icon:"airplane"},
  {id:"c9",label:"Subscriptions",type:"expense",icon:"wifi"},
  {id:"c10",label:"Other",type:"expense",icon:"dots-three"},
  {id:"c11",label:"Stipend",type:"income",icon:"graduation-cap"},
  {id:"c12",label:"Freelance",type:"income",icon:"laptop"},
  {id:"c13",label:"Gift",type:"income",icon:"gift"},
  {id:"c14",label:"Other",type:"income",icon:"dots-three"},
];
const CAT_COLS=["#A78BFA","#60A5FA","#34D399","#F87171","#FBBF24","#F472B6","#38BDF8","#A3E635","#FB923C","#818CF8","#2DD4BF","#E879F9"];
// Savings categories are treated as a separate track: they deduct the running balance
// but are excluded from the Expenses view, and they feed the (independent) savings projection.
const isSavCat=(label)=>/saving/i.test(label||"");
const SAV_COL="#5a7ad4";

// ── CASHFLOW CALENDAR ──────────────────────────────
// Continuous money calendar spanning one or more contiguous months. Each cell shows
// day number, running balance, and income/expense pills. The running balance flows
// without resetting at month boundaries; a heavier border + month tag mark where a new
// month begins. Pass `months` (ordered, contiguous "YYYY-MM" list) or a single `mon`.
function CashflowCalendar({mon,months,ym0,incCats,expCats,envelopes,savingsStart,today}){
  const T=useT();
  const OLIVE="#6b7c3a";
  const RED=T.red||"#c8412e";
  const [hoverIdx,setHoverIdx]=React.useState(null);

  const eye={fontFamily:PP_M,fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:T.muted};
  const numF={fontFamily:PP_M,fontVariantNumeric:"tabular-nums"};

  const monthList=(months&&months.length?months:[mon]);
  const firstMon=monthList[0];
  const lastMon=monthList[monthList.length-1];

  // Opening balance: roll forward (or back) from savingsStart, anchored to ym0, to firstMon.
  const netForMonth=(m)=>{
    const inc=incCats.reduce((s,c)=>s+(envelopes.find(e=>e.month===m&&e.category===c.label)?.budgeted||0),0);
    const exp=expCats.reduce((s,c)=>s+(envelopes.find(e=>e.month===m&&e.category===c.label)?.budgeted||0),0);
    return inc-exp;
  };
  let startBal=savingsStart||0;
  const ym0Date=new Date(parseInt(ym0.slice(0,4)),parseInt(ym0.slice(5,7))-1,1);
  const [fyr,fmo]=firstMon.split("-").map(Number);
  const firstMonDate=new Date(fyr,fmo-1,1);
  if(firstMonDate>ym0Date){
    const c=new Date(ym0Date);
    while(c<firstMonDate){
      const ms=`${c.getFullYear()}-${String(c.getMonth()+1).padStart(2,"0")}`;
      startBal+=netForMonth(ms);
      c.setMonth(c.getMonth()+1);
    }
  } else if(firstMonDate<ym0Date){
    const c=new Date(ym0Date);
    while(c>firstMonDate){
      c.setMonth(c.getMonth()-1);
      const ms=`${c.getFullYear()}-${String(c.getMonth()+1).padStart(2,"0")}`;
      startBal-=netForMonth(ms);
    }
  }

  // Continuous daily series across every month in the list. Savings still hit the
  // balance but are not shown as expense pills (tracked separately, out of spending).
  const series=[];
  let bal=startBal;
  monthList.forEach((m)=>{
    const [yy,mm]=m.split("-").map(Number);
    const dimM=new Date(yy,mm,0).getDate();
    const eventsByDay={};
    [...incCats,...expCats].forEach(c=>{
      if(c.type==="divider")return;
      const amt=envelopes.find(e=>e.month===m&&e.category===c.label)?.budgeted||0;
      if(!amt)return;
      const d=c.day?Math.min(c.day,dimM):1;
      const sav=c.type==="expense"&&isSavCat(c.label);
      (eventsByDay[d]=eventsByDay[d]||[]).push({cat:c,amt,type:c.type,sav});
    });
    for(let d=1;d<=dimM;d++){
      const allEvs=eventsByDay[d]||[];
      const evs=allEvs.filter(e=>!e.sav);
      const dayIn=evs.filter(e=>e.type==="income").reduce((s,e)=>s+e.amt,0);
      const dayOut=evs.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amt,0);
      const daySav=allEvs.filter(e=>e.sav).reduce((s,e)=>s+e.amt,0);
      const dayNet=dayIn-dayOut-daySav;
      const openBal=bal;
      bal+=dayNet;
      series.push({day:d,date:new Date(yy,mm-1,d),ds:`${m}-${String(d).padStart(2,"0")}`,events:evs,dayNet,dayIn,dayOut,daySav,openBal,closeBal:bal,isFirstOfMonth:d===1});
    }
  });
  const endBal=bal;
  let lowIdx=0;for(let i=1;i<series.length;i++){if(series[i].closeBal<series[lowIdx].closeBal)lowIdx=i;}
  const lowPoint=series[lowIdx];
  const totalIn=series.reduce((s,p)=>s+p.dayIn,0);
  const totalOut=series.reduce((s,p)=>s+p.dayOut,0);
  const totalSav=series.reduce((s,p)=>s+p.daySav,0);
  const netRange=totalIn-totalOut-totalSav;

  // Continuous Mon-first grid across the whole range.
  const firstDate=series[0].date;
  const offset=(firstDate.getDay()+6)%7;
  const totalDays=series.length;
  const weeks=Math.ceil((offset+totalDays)/7);

  const todayDs=toStr(today);
  const todayIdx=series.findIndex(p=>p.ds===todayDs);
  const focusIdx=hoverIdx!=null?hoverIdx:(todayIdx>=0?todayIdx:lowIdx);
  const focusInfo=series[focusIdx]||null;

  const fmtMoney=(n)=>`${n<0?"−":""}€${Math.abs(n).toLocaleString("en-GB",{maximumFractionDigits:0})}`;
  const dLabel=(p)=>`${MFULL[p.date.getMonth()].slice(0,3)} ${String(p.day).padStart(2,"0")}`;
  const mLabel=(m)=>{const [y,mm]=m.split("-").map(Number);return MFULL[mm-1]+" "+y;};
  const rangeLabel=monthList.length===1?mLabel(firstMon):(()=>{const [y1,m1]=firstMon.split("-").map(Number);const [y2,m2]=lastMon.split("-").map(Number);return y1===y2?`${MFULL[m1-1]} – ${MFULL[m2-1]} ${y1}`:`${MFULL[m1-1].slice(0,3)} ${y1} – ${MFULL[m2-1].slice(0,3)} ${y2}`;})();

  // Cell tint based on balance/flow
  const cellBg=(p)=>{
    if(!p)return"transparent";
    if(p.closeBal<0)return alpha(RED,0.18);
    if(p.dayNet<0&&p.dayOut>0)return alpha(RED,0.04);
    if(p.dayNet>0)return alpha(OLIVE,0.06);
    return"transparent";
  };

  return <div style={{paddingTop:22,marginTop:14,borderTop:`1px solid ${T.border}`}}>
    {/* Header */}
    <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:14,gap:14,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"baseline",gap:14}}>
        <span style={{fontFamily:PP_S,fontStyle:"italic",fontSize:26,color:T.text,letterSpacing:"-0.4px",lineHeight:1}}>Cashflow</span>
        <span style={{...eye,fontSize:9,color:T.muted}}>{rangeLabel} · Money Calendar</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:14,...eye,fontSize:9,color:T.muted}}>
        <span style={{display:"inline-flex",alignItems:"center",gap:5}}><span style={{width:8,height:8,background:OLIVE,display:"inline-block"}}/>Income</span>
        <span style={{display:"inline-flex",alignItems:"center",gap:5}}><span style={{width:8,height:8,background:RED,display:"inline-block"}}/>Expense</span>
      </div>
    </div>

    {/* Stat strip: OPEN · LOW · NET · CLOSE */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:0,border:`1px solid ${T.border}`,marginBottom:12,background:T.cardAlt||T.bg}}>
      {[
        {label:"OPENING",v:fmtMoney(startBal),sub:"start of range",color:startBal<0?RED:T.text},
        {label:"LOW POINT",v:fmtMoney(lowPoint.closeBal),sub:dLabel(lowPoint),color:lowPoint.closeBal<0?RED:T.text},
        {label:"NET",v:(netRange>=0?"+":"")+fmtMoney(netRange),sub:`+${fmtMoney(totalIn)} / −${fmtMoney(totalOut)}${totalSav>0?` / ${fmtMoney(totalSav)} saved`:""}`,color:netRange>=0?OLIVE:RED},
        {label:"CLOSING",v:fmtMoney(endBal),sub:"end of range",color:endBal<0?RED:T.text}
      ].map((s,i)=>(
        <div key={i} style={{padding:"10px 14px",borderRight:i<3?`1px solid ${T.border}`:"none"}}>
          <div style={{...eye,fontSize:8,marginBottom:4}}>{s.label}</div>
          <div style={{...numF,fontSize:18,fontWeight:600,color:s.color,lineHeight:1}}>{s.v}</div>
          <div style={{...eye,fontSize:7,marginTop:4,opacity:0.7}}>{s.sub}</div>
        </div>
      ))}
    </div>

    {/* Detail strip */}
    {focusInfo&&
      <div style={{padding:"10px 14px",border:`1px solid ${T.border}`,background:T.bg,marginBottom:12,display:"flex",alignItems:"baseline",gap:14,flexWrap:"wrap"}}>
        <div style={{...eye,fontSize:9,color:hoverIdx!=null?T.text:T.muted,flexShrink:0}}>{hoverIdx!=null?"HOVER":"FOCUS"} · {dLabel(focusInfo)}</div>
        <div style={{...numF,fontSize:11,color:T.muted,flexShrink:0}}>OPEN {fmtMoney(focusInfo.openBal)}</div>
        {focusInfo.events.length===0&&focusInfo.daySav===0?
          <div style={{fontFamily:F,fontSize:11,color:T.muted,fontStyle:"italic",flex:1}}>no movements</div>
          :
          <div style={{display:"flex",gap:10,flexWrap:"wrap",flex:1}}>
            {focusInfo.events.map((ev,ei)=>{
              const isInc=ev.type==="income";
              const c=isInc?OLIVE:RED;
              return <span key={ei} style={{...numF,fontSize:11,color:c,fontWeight:600}}>
                {isInc?"+":"−"}€{ev.amt.toLocaleString("en-GB")} <span style={{color:T.text,fontWeight:400,opacity:0.7}}>{ev.cat.label}</span>
              </span>;
            })}
            {focusInfo.daySav>0&&<span style={{...numF,fontSize:11,color:SAV_COL,fontWeight:600}}>↓€{focusInfo.daySav.toLocaleString("en-GB")} <span style={{color:T.text,fontWeight:400,opacity:0.7}}>saved</span></span>}
          </div>
        }
        <div style={{...numF,fontSize:12,color:focusInfo.closeBal<0?RED:T.text,fontWeight:700,flexShrink:0}}>CLOSE {fmtMoney(focusInfo.closeBal)}</div>
      </div>
    }

    {/* Calendar grid */}
    <div style={{border:`1px solid ${T.border}`,background:T.card||T.bg}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:`1px solid ${T.border}`,background:T.bg}}>
        {["MON","TUE","WED","THU","FRI","SAT","SUN"].map((d,i)=>(
          <div key={d} style={{padding:"8px 0",textAlign:"center",...eye,fontSize:9,color:T.muted,borderRight:i<6?`1px solid ${T.border}`:"none"}}>{d}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gridAutoRows:"minmax(94px, 1fr)"}}>
        {Array.from({length:weeks*7},(_,i)=>{
          const dayIndex=i-offset;
          const inRange=dayIndex>=0&&dayIndex<totalDays;
          const p=inRange?series[dayIndex]:null;
          const isToday=inRange&&p.ds===todayDs;
          const isLow=inRange&&dayIndex===lowIdx&&lowPoint.closeBal<0;
          const isHover=inRange&&hoverIdx===dayIndex;
          const isMonthLabel=inRange&&p.isFirstOfMonth;
          const isMonthBreak=isMonthLabel&&dayIndex>0;
          const colIdx=i%7;
          const rowIdx=Math.floor(i/7);
          const evs=inRange?p.events:[];
          return <div key={i}
            onMouseEnter={inRange?()=>setHoverIdx(dayIndex):undefined}
            onMouseLeave={inRange?()=>setHoverIdx(null):undefined}
            style={{
              position:"relative",padding:"5px 6px",
              borderRight:colIdx<6?`1px solid ${T.border}`:"none",
              borderBottom:rowIdx<weeks-1?`1px solid ${T.border}`:"none",
              borderTop:isMonthBreak?`2px solid ${alpha(T.text,.45)}`:"none",
              borderLeft:isMonthBreak?`2px solid ${alpha(T.text,.45)}`:"none",
              background:isHover?alpha(T.text||"#000",0.05):cellBg(p),
              transition:"background 0.1s",
              overflow:"hidden",
              opacity:inRange?1:0.25
            }}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4,gap:4}}>
              <span style={{...numF,fontSize:isToday?13:11,fontWeight:isToday||isMonthLabel?700:500,color:inRange?(isMonthLabel?(T.red||RED):T.text):T.muted,whiteSpace:"nowrap"}}>
                {inRange?(isMonthLabel?MFULL[p.date.getMonth()].slice(0,3).toUpperCase()+" "+String(p.day).padStart(2,"0"):String(p.day).padStart(2,"0")):""}
              </span>
              {inRange&&
                <span style={{...numF,fontSize:10,fontWeight:600,color:p.closeBal<0?RED:T.muted}}>
                  {p.closeBal<0?"−":""}€{Math.abs(Math.round(p.closeBal)).toLocaleString("en-GB")}
                </span>
              }
            </div>
            {inRange&&evs.length>0&&
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                {evs.slice(0,3).map((ev,ei)=>{
                  const isInc=ev.type==="income";
                  const c=isInc?OLIVE:RED;
                  return <div key={ei} title={`${ev.cat.label} ${isInc?"+":"−"}€${ev.amt}`}
                    style={{display:"flex",alignItems:"center",gap:4,background:alpha(c,0.14),borderLeft:`3px solid ${c}`,padding:"2px 5px",borderRadius:2,minHeight:14,overflow:"hidden"}}>
                    <span style={{...numF,fontSize:9,fontWeight:700,color:c,flexShrink:0}}>
                      {isInc?"+":"−"}€{ev.amt}
                    </span>
                    <span style={{fontSize:9,color:T.text,opacity:0.78,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,fontFamily:F}}>
                      {ev.cat.label}
                    </span>
                  </div>;
                })}
                {evs.length>3&&
                  <span style={{...eye,fontSize:7,color:T.muted,padding:"1px 0"}}>+{evs.length-3} more</span>
                }
              </div>
            }
            {inRange&&p.daySav>0&&
              <div title={`€${p.daySav} set aside to savings — deducts balance, not counted as spending`}
                style={{display:"inline-flex",alignItems:"center",gap:3,marginTop:evs.length>0?3:0,border:`1px dashed ${alpha(SAV_COL,.5)}`,borderRadius:2,padding:"1px 5px",alignSelf:"flex-start"}}>
                <span style={{...numF,fontSize:8,fontWeight:700,color:SAV_COL,letterSpacing:"0.04em"}}>↓€{p.daySav} saved</span>
              </div>
            }
            {isLow&&
              <div style={{position:"absolute",bottom:3,right:5,...eye,fontSize:7,color:RED,fontWeight:700}}>LOW ↓</div>
            }
            {isToday&&
              <div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:T.mint||OLIVE}}/>
            }
          </div>;
        })}
      </div>
    </div>
  </div>;
}

function BudgetWidget({budget,setBudget,envelopes,setEnvelopes,budgetCats,setBudgetCats,pageMode}){
  const T=useT();
  const today=new Date(),todayStr=toStr(today);
  const ym0=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}`;
  const [mon,setMon]=useState(ym0);
  const [tab,setTab]=useState("trends");
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({date:todayStr,amount:"",type:"expense",category:"Food",description:""});
  const [editId,setEditId]=useState(null);
  const [showEnvEdit,setShowEnvEdit]=useState(null);
  const [envForm,setEnvForm]=useState({category:"Food",type:"expense",budgeted:"",isFixed:false});
  const [pickerFor,setPickerFor]=useState(null);
  const [catEditId,setCatEditId]=useState(null);
  const [catEditLabel,setCatEditLabel]=useState("");
  const [catAdd,setCatAdd]=useState(null);
  const [quickRec,setQuickRec]=useState(null); // env.id | null
  const [quickForm,setQuickForm]=useState({amount:"",date:todayStr,desc:""});
  const [planCell,setPlanCell]=useState(null); // {month,cat} | null
  const [planVal,setPlanVal]=useState("");
  const planClickRef=useRef(null);
  const [importToast,setImportToast]=useState(null); // null | {count,skipped}
  const csvInputRef=useRef(null);
  const [dragCatId,setDragCatId]=useState(null);
  const [dragOverCatId,setDragOverCatId]=useState(null);
  const [savingsStart,setSavingsStart]=useState(()=>parseFloat(lg("plo3_sav_start","0"))||0);
  const [savingsRate,setSavingsRate]=useState(()=>parseFloat(lg("plo3_sav_rate","0"))||0);

  const monLabel=useMemo(()=>{const p=mon.split("-");return MFULL[parseInt(p[1])-1]+" "+p[0];},[mon]);
  const prevMon=()=>{const d=new Date(mon+"-01");d.setMonth(d.getMonth()-1);setMon(toStr(d).slice(0,7));};
  const nextMon=()=>{const d=new Date(mon+"-01");d.setMonth(d.getMonth()+1);setMon(toStr(d).slice(0,7));};

  const entries=useMemo(()=>budget.filter(e=>e.date.startsWith(mon)).sort((a,b)=>b.date.localeCompare(a.date)),[budget,mon]);
  const actualIncome=useMemo(()=>entries.filter(e=>e.type==="income").reduce((s,e)=>s+e.amount,0),[entries]);
  const actualExpense=useMemo(()=>entries.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0),[entries]);
  const actualNet=actualIncome-actualExpense;

  const monEnv=useMemo(()=>envelopes.filter(e=>e.month===mon),[envelopes,mon]);
  const incomeEnv=useMemo(()=>monEnv.filter(e=>e.type==="income"),[monEnv]);
  const expEnv=useMemo(()=>monEnv.filter(e=>e.type==="expense"),[monEnv]);
  const budgetedIncome=useMemo(()=>incomeEnv.reduce((s,e)=>s+e.budgeted,0),[incomeEnv]);
  const budgetedExpense=useMemo(()=>expEnv.reduce((s,e)=>s+e.budgeted,0),[expEnv]);
  const unallocated=budgetedIncome-budgetedExpense;

  const catActuals=useMemo(()=>{const m={};entries.filter(e=>e.type==="expense").forEach(e=>{m[e.category]=(m[e.category]||0)+e.amount;});return m;},[entries]);

  const expCats=useMemo(()=>budgetCats.filter(c=>c.type==="expense"),[budgetCats]);
  const incCats=useMemo(()=>budgetCats.filter(c=>c.type==="income"),[budgetCats]);
  const incSection=useMemo(()=>budgetCats.filter(c=>c.type==="income"||(c.type==="divider"&&c.section==="income")),[budgetCats]);
  const expSection=useMemo(()=>budgetCats.filter(c=>c.type==="expense"||(c.type==="divider"&&c.section==="expense")),[budgetCats]);
  // Expenses ledger excludes savings categories (shown in their own track); dividers stay with expenses.
  const expSectionMain=useMemo(()=>expSection.filter(c=>c.type==="divider"||!isSavCat(c.label)),[expSection]);
  const savSection=useMemo(()=>expSection.filter(c=>c.type!=="divider"&&isSavCat(c.label)),[expSection]);
  function getCatIcon(label){return(budgetCats.find(c=>c.label===label)||{icon:"dots-three"}).icon;}
  function getCatColor(label){const i=budgetCats.findIndex(c=>c.label===label);return CAT_COLS[i>=0?i%CAT_COLS.length:0];}

  // Category management
  function pickIcon(icon){
    if(pickerFor==="new"){setCatAdd(p=>({...p,icon}));}
    else if(pickerFor){setBudgetCats(p=>p.map(c=>c.id===pickerFor?{...c,icon}:c));}
    setPickerFor(null);
  }
  function saveCatLabel(){
    if(!catEditLabel.trim()){setCatEditId(null);return;}
    setBudgetCats(p=>p.map(c=>c.id===catEditId?{...c,label:catEditLabel.trim()}:c));
    setCatEditId(null);
  }
  function deleteCat(id){setBudgetCats(p=>p.filter(c=>c.id!==id));}
  function addCat(){
    if(!catAdd||!catAdd.label.trim())return;
    setBudgetCats(p=>[...p,{id:uid(),label:catAdd.label.trim(),type:catAdd.type,icon:catAdd.icon}]);
    setCatAdd(null);setPickerFor(null);
  }
  function onCatDragStart(e,id){setDragCatId(id);e.dataTransfer.effectAllowed="move";}
  function onCatDragOver(e,id){e.preventDefault();if(id!==dragCatId)setDragOverCatId(id);}
  function onCatDrop(e,targetId){
    e.preventDefault();
    if(!dragCatId||dragCatId===targetId){setDragCatId(null);setDragOverCatId(null);return;}
    setBudgetCats(prev=>{
      const arr=[...prev];
      const fromIdx=arr.findIndex(c=>c.id===dragCatId);
      const toIdx=arr.findIndex(c=>c.id===targetId);
      if(fromIdx===-1||toIdx===-1)return prev;
      arr.splice(toIdx,0,arr.splice(fromIdx,1)[0]);
      return arr;
    });
    setDragCatId(null);setDragOverCatId(null);
  }
  function onCatDragEnd(){setDragCatId(null);setDragOverCatId(null);}
  function addDivider(section){setBudgetCats(p=>[...p,{id:uid(),type:"divider",label:"Section",section}]);}
  function removeDivider(id){setBudgetCats(p=>p.filter(c=>c.id!==id));}

  function seedFromFixed(){
    const seen={};
    [...envelopes.filter(e=>e.isFixed)].reverse().forEach(e=>{const k=`${e.type}_${e.category}`;if(!seen[k])seen[k]=e;});
    const toAdd=Object.values(seen).map(e=>({...e,id:uid(),month:mon}));
    if(toAdd.length>0)setEnvelopes(p=>[...p.filter(e=>e.month!==mon),...toAdd]);
  }

  function openNewEnv(type){const def=budgetCats.find(c=>c.type===type);setEnvForm({category:def?.label||"Other",type,budgeted:"",isFixed:false});setShowEnvEdit("new");}
  function openEditEnv(env){setEnvForm({category:env.category,type:env.type,budgeted:String(env.budgeted),isFixed:!!env.isFixed});setShowEnvEdit(env.id);}
  function saveEnvelope(){
    const amt=parseFloat(envForm.budgeted);if(!amt||isNaN(amt))return;
    if(showEnvEdit==="new"){setEnvelopes(p=>[...p,{id:uid(),month:mon,category:envForm.category,type:envForm.type,budgeted:amt,isFixed:envForm.isFixed}]);}
    else{setEnvelopes(p=>p.map(e=>e.id===showEnvEdit?{...e,category:envForm.category,budgeted:amt,isFixed:envForm.isFixed}:e));}
    setShowEnvEdit(null);
  }
  function removeEnvelope(id){setEnvelopes(p=>p.filter(e=>e.id!==id));}

  function startAdd(){const def=budgetCats.find(c=>c.type==="expense");setForm({date:todayStr,amount:"",type:"expense",category:def?.label||"Other",description:""});setEditId(null);setShowAdd(true);}

  // CSV import: parses life-os-log.csv from iCloud Shortcuts
  // Expected columns (any order, first row = header):
  //   date, amount, description/desc/merchant/name, category/cat, type
  function handleCsvImport(e){
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    e.target.value="";
    const reader=new FileReader();
    reader.onload=ev=>{
      const text=ev.target.result||"";
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){setImportToast({count:0,skipped:0,err:"No data rows found."});return;}
      // Parse header
      const headers=lines[0].split(",").map(h=>h.trim().toLowerCase().replace(/^"|"$/g,""));
      const idx={
        date:    headers.findIndex(h=>h==="date"),
        amount:  headers.findIndex(h=>h==="amount"),
        desc:    headers.findIndex(h=>["description","desc","merchant","name"].includes(h)),
        cat:     headers.findIndex(h=>["category","cat"].includes(h)),
        type:    headers.findIndex(h=>h==="type"),
      };
      if(idx.date<0||idx.amount<0){setImportToast({count:0,skipped:0,err:"CSV must have 'date' and 'amount' columns."});return;}
      const newEntries=[];
      const skipped={dup:0,bad:0};
      setBudget(prev=>{
        const existing=prev;
        for(let i=1;i<lines.length;i++){
          // Handle quoted fields
          const cols=lines[i].match(/("(?:[^"]|"")*"|[^,]*)/g).map(v=>v.replace(/^"|"$/g,"").replace(/""/g,'"').trim());
          const date=(cols[idx.date]||"").slice(0,10);
          const amt=parseFloat(cols[idx.amount]||"0");
          if(!date||isNaN(amt)||amt<=0){skipped.bad++;continue;}
          const desc=idx.desc>=0?(cols[idx.desc]||""):"";
          const cat=idx.cat>=0&&cols[idx.cat]?(cols[idx.cat]):"Other";
          const rawType=idx.type>=0?(cols[idx.type]||"expense").toLowerCase():"expense";
          const type=rawType==="income"?"income":"expense";
          // Deduplicate: same date + amount + description
          const isDup=existing.some(x=>x.date===date&&x.amount===amt&&(x.description||"")===(desc||""));
          const isNewDup=newEntries.some(x=>x.date===date&&x.amount===amt&&(x.description||"")===(desc||""));
          if(isDup||isNewDup){skipped.dup++;continue;}
          newEntries.push({id:uid(),date,amount:amt,type,category:cat,description:desc});
        }
        if(newEntries.length===0){
          setTimeout(()=>setImportToast({count:0,skipped:skipped.dup+skipped.bad,err:null}),0);
          return prev;
        }
        setTimeout(()=>setImportToast({count:newEntries.length,skipped:skipped.dup+skipped.bad,err:null}),0);
        return [...prev,...newEntries];
      });
    };
    reader.readAsText(file);
    setTimeout(()=>setImportToast(null),4000);
  }

  const planMonths=useMemo(()=>{

    return ms;
  },[]);
  function getPlanAmt(m,cat){return envelopes.find(e=>e.month===m&&e.category===cat)?.budgeted||0;}
  const planTotals=useMemo(()=>{
    let bal=0;
    // Savings categories still deduct the running balance, but are kept out of the
    // displayed Expenses figure (exp) so they live in their own Savings track.
    return planMonths.map(m=>{
      const amtOf=(c)=>envelopes.find(e=>e.month===m&&e.category===c.label)?.budgeted||0;
      const inc=incCats.reduce((s,c)=>s+amtOf(c),0);
      const exp=expCats.filter(c=>!isSavCat(c.label)).reduce((s,c)=>s+amtOf(c),0);
      const sav=expCats.filter(c=>isSavCat(c.label)).reduce((s,c)=>s+amtOf(c),0);
      bal+=inc-exp-sav;
      return{m,inc,exp,sav,net:inc-exp-sav,running:bal};
    });
  },[planMonths,incCats,expCats,envelopes]);
  const savingsProjection=useMemo(()=>{
    let bal=savingsStart||0;
    const mr=(savingsRate||0)/100/12;
    return planTotals.map(({m,sav})=>{
      bal=bal*(1+mr)+(sav||0);
      return{m,bal};
    });
  },[planTotals,savingsStart,savingsRate]);
  // Daily balance trajectory per month — finds low point within the month.
  // Items without a `day` are lumped at day 1 (conservative). Items with `day` clamp to last day of month.
  const monthDaily=useMemo(()=>{
    let bal=0;
    return planMonths.map(m=>{
      const [yr,mo]=m.split("-").map(Number);
      const dim=new Date(yr,mo,0).getDate();
      const startBal=bal;
      const byDay={};
      [...incCats,...expCats].forEach(c=>{
        if(c.type==="divider")return;
        const amt=envelopes.find(e=>e.month===m&&e.category===c.label)?.budgeted||0;
        if(!amt)return;
        const sign=c.type==="income"?1:-1;
        const d=c.day?Math.min(c.day,dim):1;
        byDay[d]=(byDay[d]||0)+sign*amt;
      });
      let low=startBal,lowDay=0,cur=startBal;
      for(let d=1;d<=dim;d++){
        cur+=byDay[d]||0;
        if(cur<low){low=cur;lowDay=d;}
      }
      const trajectory=[];
      let t=startBal;
      for(let d=1;d<=dim;d++){t+=byDay[d]||0;trajectory.push(t);}
      bal=cur;
      return{m,startBal,low,lowDay,end:cur,dim,trajectory};
    });
  },[planMonths,incCats,expCats,envelopes]);

      return[...prev,{id:uid(),month:m,category:cat,type,budgeted:amt,isFixed:false}];
    });
  }

        else{u.push({id:uid(),month:m,category:cat,type,budgeted:amt,isFixed:false});}
      });
      return u;
    });

                </div>
              }
            </div>;
          })}
        </div>

        {/* ── EXPENSES ledger ── */}
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingBottom:14,borderBottom:`1px solid ${T.border}`}}>
            <div style={eye}>Expenses</div>
            <button onClick={()=>openNewEnv("expense")} aria-label="Add expense" style={{...GHOST_BTN,padding:"7px 14px",letterSpacing:"0.22em"}}>+ Add</button>
          </div>
          {expCats.map(cat=>{
            const env=expEnv.find(e=>e.category===cat.label);
            const sk=`se-${cat.id}`;
            const actual=env?catActuals[env.category]||0:0;
            const pct=env&&env.budgeted>0?Math.min(100,(actual/env.budgeted)*100):0;
            const over=env&&actual>env.budgeted;
            const isLast=cat===expCats[expCats.length-1];
            // Segmented progress (10 segments) for editorial Goals-card feel
            const segCount=10;
            const segDone=env?Math.min(segCount,Math.round((pct/100)*segCount)):0;
            return <div key={cat.id} style={{borderBottom:isLast?"none":`1px dashed ${T.lineSoft||T.borderSft}`}}>
              <div style={{display:"flex",alignItems:"center",gap:14,padding:"18px 4px 12px",background:env?(over?alpha(ACC,.06):alpha(T.text,.025)):"transparent"}}>
                <button onClick={()=>{if(env){openEditEnv(env);}else{if(showEnvEdit===sk){setShowEnvEdit(null);}else{setEnvForm(p=>({...p,budgeted:"",isFixed:false}));setShowEnvEdit(sk);}}}} title={env?"Edit envelope":"Set budget"} style={{width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${env?(over?alpha(ACC,.45):T.border):T.border}`,background:env?(over?alpha(ACC,.08):T.cardAlt):"transparent",color:env?(over?ACC:T.text):T.text,cursor:"pointer",padding:0,flexShrink:0}}>
                  <Ico n={getCatIcon(cat.label)} size={20}/>
                </button>
                <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:4}}>
                  <div style={{fontFamily:PP_S,fontSize:18,fontWeight:500,color:env?T.text:T.muted||T.textLt,letterSpacing:"-0.005em",lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cat.label}</div>
                  {env?.isFixed
                    ?<div style={{fontFamily:PP_M,fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:T.muted||T.textLt}}>Fixed · auto-seeds each month</div>
                    :env?null
                    :<div style={{fontFamily:PP_S,fontStyle:"italic",fontSize:13,color:T.muted||T.textLt,letterSpacing:"-0.005em",opacity:.85}}>not budgeted</div>}
                </div>
                {env
                  ?<>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,minWidth:130}}>
                        <div style={{fontFamily:PP_M,fontSize:18,fontWeight:600,color:over?ACC:T.text,letterSpacing:"-0.015em",fontVariantNumeric:"tabular-nums",lineHeight:1.1}}>
                          €{actual.toFixed(0)} <span style={{color:T.muted||T.textLt,fontWeight:500}}>/ €{env.budgeted.toFixed(0)}</span>
                        </div>
                        <div style={{fontFamily:PP_M,fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:over?ACC:T.muted||T.textLt}}>{over?"over · ":""}{Math.round(pct)}%</div>
                      </div>
                      <button onClick={()=>openQuick(env)} title="Quick record" style={{...ICON_BTN_BORDER,border:`1px solid ${quickRec===env.id?alpha(ACC,.55):alpha(ACC,.35)}`,background:quickRec===env.id?alpha(ACC,.16):alpha(ACC,.06),color:ACC}}>
                        <Ico n="plus" size={16}/>
                      </button>
                      <button onClick={()=>openEditEnv(env)} title="Edit" style={ICON_BTN_BORDER}>
                        <Ico n="pencil-simple" size={15}/>
                      </button>
                      <button onClick={()=>removeEnvelope(env.id)} title="Remove" style={{...ICON_BTN_BORDER,fontSize:18,lineHeight:1}}>×</button>
                    </>
                  :<button onClick={()=>{if(showEnvEdit===sk){setShowEnvEdit(null);}else{setEnvForm(p=>({...p,budgeted:"",isFixed:false}));setShowEnvEdit(sk);}}} style={{background:"transparent",border:`1px solid ${alpha(ACC,.4)}`,cursor:"pointer",color:ACC,fontFamily:PP_M,fontSize:11,fontWeight:700,letterSpacing:"0.24em",textTransform:"uppercase",padding:"10px 18px"}}>Set</button>
                }
              </div>
              {env&&
                <div style={{padding:"0 4px 18px",display:"flex",gap:3}}>
                  {Array.from({length:segCount}).map((_,i)=>(
                    <div key={i} style={{flex:1,height:6,background:i<segDone?(over?ACC:T.text):T.border,opacity:i<segDone?1:.55,transition:"background 0.2s"}}/>
                  ))}
                </div>
              }
              {env&&quickRec===env.id&&
                <div style={{display:"flex",gap:8,padding:"4px 4px 16px",alignItems:"center",flexWrap:"wrap"}}>
                  <input autoFocus value={quickForm.amount} onChange={ev=>setQuickForm(p=>({...p,amount:ev.target.value}))} onKeyDown={ev=>{if(ev.key==="Enter")saveQuick(env);if(ev.key==="Escape")setQuickRec(null);}} placeholder="Amount €" type="number" min="0" step="0.01" style={{...PIS,flex:"1 1 110px",minWidth:110}}/>
                  <input value={quickForm.date} onChange={ev=>setQuickForm(p=>({...p,date:ev.target.value}))} type="date" style={{...PIS,width:160}}/>
                  <input value={quickForm.desc} onChange={ev=>setQuickForm(p=>({...p,desc:ev.target.value}))} placeholder="Note (optional)" style={{...PIS,flex:"2 1 200px",minWidth:160}}/>
                  <button onClick={()=>saveQuick(env)} style={PRIMARY_BTN}>Log</button>
                  <button onClick={()=>setQuickRec(null)} style={{...ICON_BTN_BORDER,fontSize:18,lineHeight:1}}>×</button>
                </div>
              }
              {env&&showEnvEdit===env.id&&
                <div style={{display:"flex",flexDirection:"column",gap:10,padding:"4px 4px 16px"}}>
                  <div style={{display:"flex",gap:8}}>
                    <select value={envForm.category} onChange={ev=>setEnvForm(p=>({...p,category:ev.target.value}))} style={{...PIS,flex:1}}>
                      {expCats.map(c=><option key={c.id} value={c.label}>{c.label}</option>)}
                    </select>
                    <input value={envForm.budgeted} onChange={ev=>setEnvForm(p=>({...p,budgeted:ev.target.value}))} placeholder="€" type="number" min="0" step="1" style={{...PIS,width:120}}/>
                  </div>
                  <label style={{display:"flex",alignItems:"center",gap:8,fontFamily:PP_M,fontSize:11,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:T.muted||T.textLt,cursor:"pointer"}}>
                    <input type="checkbox" checked={envForm.isFixed} onChange={ev=>setEnvForm(p=>({...p,isFixed:ev.target.checked}))}/>Recurring — auto-seeds each month
                  </label>
                  <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                    <button onClick={()=>setShowEnvEdit(null)} style={GHOST_BTN}>Cancel</button>
                    <button onClick={saveEnvelope} style={PRIMARY_BTN}>Save</button>
                  </div>
                </div>
              }
              {!env&&showEnvEdit===sk&&
                <div style={{display:"flex",flexDirection:"column",gap:10,padding:"10px 4px 16px"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <input autoFocus value={envForm.budgeted} onChange={ev=>setEnvForm(p=>({...p,budgeted:ev.target.value}))}
                      onKeyDown={ev=>{if(ev.key==="Enter"){const a=parseFloat(envForm.budgeted);if(!isNaN(a)&&a>0){setEnvelopes(p=>[...p,{id:uid(),month:mon,category:cat.label,type:"expense",budgeted:a,isFixed:!!envForm.isFixed}]);setShowEnvEdit(null);}}if(ev.key==="Escape")setShowEnvEdit(null);}}
                      placeholder="Budget €" type="number" min="0" step="1" style={{...PIS,flex:1}}/>
                    <label style={{display:"flex",alignItems:"center",gap:8,fontFamily:PP_M,fontSize:11,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:T.muted||T.textLt,cursor:"pointer",flexShrink:0}}>
                      <input type="checkbox" checked={envForm.isFixed} onChange={ev=>setEnvForm(p=>({...p,isFixed:ev.target.checked}))}/>Recurring
                    </label>
                  </div>
                  <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                    <button onClick={()=>setShowEnvEdit(null)} style={GHOST_BTN}>Cancel</button>
                    <button onClick={()=>{const a=parseFloat(envForm.budgeted);if(!isNaN(a)&&a>0){setEnvelopes(p=>[...p,{id:uid(),month:mon,category:cat.label,type:"expense",budgeted:a,isFixed:!!envForm.isFixed}]);setShowEnvEdit(null);}}} style={PRIMARY_BTN}>Set</button>
                  </div>
                </div>
              }
            </div>;
          })}

          {/* New envelope (any type) */}
          {showEnvEdit==="new"&&
            <div style={{display:"flex",flexDirection:"column",gap:10,padding:"16px 4px 4px",borderTop:`1px solid ${T.lineSoft||T.borderSft}`,marginTop:8}}>
              <div style={eye}>New envelope</div>
              <div style={{display:"flex",gap:8}}>
                <select value={envForm.type} onChange={ev=>setEnvForm(p=>({...p,type:ev.target.value,category:ev.target.value==="income"?"Stipend":"Food"}))} style={{...PIS,width:130}}>
                  <option value="expense">Expense</option>
                  <option value="income">Income</option>
                </select>
                <select value={envForm.category} onChange={ev=>setEnvForm(p=>({...p,category:ev.target.value}))} style={{...PIS,flex:1}}>
                  {envFormCats.map(c=><option key={c.id} value={c.label}>{c.label}</option>)}
                </select>
                <input value={envForm.budgeted} onChange={ev=>setEnvForm(p=>({...p,budgeted:ev.target.value}))} placeholder="€" type="number" min="0" step="1" style={{...PIS,width:110}}/>
              </div>
              <label style={{display:"flex",alignItems:"center",gap:8,fontFamily:PP_M,fontSize:11,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:T.muted||T.textLt,cursor:"pointer"}}>
                <input type="checkbox" checked={envForm.isFixed} onChange={ev=>setEnvForm(p=>({...p,isFixed:ev.target.checked}))}/>Recurring — auto-seeds each month
              </label>
              <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                <button onClick={()=>setShowEnvEdit(null)} style={GHOST_BTN}>Cancel</button>
                <button onClick={saveEnvelope} style={PRIMARY_BTN}>Add</button>
              </div>
            </div>
          }
        </div>

        {/* ── Manage categories (merged from old Cats tab) ── */}
        <div style={{...sectionDivider,paddingTop:18,display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
            <span style={eye}>Manage Categories</span>
            <span style={{fontFamily:PP_S,fontStyle:"italic",fontSize:12,color:T.muted,opacity:0.75}}>rename · reorder · set debit day · icon · delete</span>
          </div>
          {["expense","income"].map(type=>(
            <div key={type}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:9,color:T.muted||T.textLt,fontFamily:PP_M,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.2em"}}>{type==="income"?"Income":"Expenses"}</span>
                <button onClick={()=>{setCatAdd({type,label:"",icon:"dots-three"});setPickerFor(null);}} style={{background:"none",border:"none",cursor:"pointer",color:type==="income"?T.mint:T.pink,fontSize:13,fontFamily:F,lineHeight:1,padding:"0 2px"}}>+</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:0,border:`1px solid ${T.border}`,background:T.cardAlt}}>
                {budgetCats.filter(c=>c.type===type).map(cat=>(
                  <div key={cat.id}
                    draggable
                    onDragStart={e=>onCatDragStart(e,cat.id)}
                    onDragOver={e=>onCatDragOver(e,cat.id)}
                    onDrop={e=>onCatDrop(e,cat.id)}
                    onDragEnd={onCatDragEnd}
                    style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",borderRadius:0,background:dragOverCatId===cat.id?alpha(type==="income"?T.mint:T.pink,.08):"transparent",borderBottom:`1px solid ${T.border}`,opacity:dragCatId===cat.id?0.4:1,transition:"background 0.08s"}}>
                    <span style={{fontSize:13,color:T.textLt,cursor:"grab",userSelect:"none",opacity:0.35,lineHeight:1,flexShrink:0}}>⠿</span>
                    <button onClick={()=>{setCatAdd(null);setPickerFor(pickerFor===cat.id?null:cat.id);}}
                      style={{width:26,height:26,borderRadius:0,border:`1px solid ${pickerFor===cat.id?alpha(T.mint,.5):alpha(T.border,.3)}`,background:pickerFor===cat.id?alpha(T.mint,.12):"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:T.text}}>
                      <Ico n={cat.icon||"dots-three"} size={13}/>
                    </button>
                    {catEditId===cat.id
                      ?<input value={catEditLabel} onChange={ev=>setCatEditLabel(ev.target.value)}
                          onBlur={saveCatLabel} onKeyDown={ev=>{if(ev.key==="Enter")saveCatLabel();if(ev.key==="Escape")setCatEditId(null);}}
                          autoFocus style={{...IS,flex:1,padding:"2px 6px",fontSize:11}}/>
                      :<span onClick={()=>{setCatEditId(cat.id);setCatEditLabel(cat.label);}}
                          style={{flex:1,fontSize:11,color:T.text,fontFamily:F,cursor:"text",padding:"2px 0"}} title="Click to rename">{cat.label}</span>
                    }
                    <input type="text" inputMode="numeric" pattern="[0-9]*" maxLength={2} placeholder="–" title="Day of month debited (1–31)"
                      value={cat.day||""}
                      onChange={ev=>{const raw=ev.target.value.replace(/[^0-9]/g,"");const v=parseInt(raw);setBudgetCats(p=>p.map(c=>c.id===cat.id?{...c,day:(isNaN(v)||v<1||v>31)?undefined:v}:c));}}
                      style={{width:36,fontSize:10,fontFamily:PP_M,fontVariantNumeric:"tabular-nums",background:T.inp,border:`1px solid ${T.border}`,borderRadius:0,color:T.text,padding:"2px 4px",outline:"none",textAlign:"center",flexShrink:0}}/>
                    <span style={{fontSize:8,color:T.textLt,fontFamily:F,opacity:.5}}>{type}</span>
                    <button onClick={()=>deleteCat(cat.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.textLt,fontSize:13,lineHeight:1,padding:"0 2px",flexShrink:0}}>×</button>
                  </div>
                ))}
                {catAdd?.type===type&&
                  <div style={{display:"flex",alignItems:"center",gap:4,padding:"5px 8px",borderRadius:0,background:T.cardAlt,border:`1px dashed ${alpha(T.border,.35)}`}}>
                    <button onClick={()=>setPickerFor(pickerFor==="new"?null:"new")}
                      style={{width:26,height:26,borderRadius:0,border:`1px solid ${pickerFor==="new"?alpha(T.mint,.5):alpha(T.border,.3)}`,background:pickerFor==="new"?alpha(T.mint,.12):"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:T.text}}>
                      <Ico n={catAdd.icon} size={13}/>
                    </button>
                    <input value={catAdd.label} onChange={ev=>setCatAdd(p=>({...p,label:ev.target.value}))}
                      onKeyDown={ev=>{if(ev.key==="Enter")addCat();if(ev.key==="Escape")setCatAdd(null);}}
                      autoFocus placeholder="Category name"
                      style={{...IS,flex:1,padding:"2px 6px",fontSize:11}}/>
                    <Btn small primary onClick={addCat}>Add</Btn>
                    <button onClick={()=>{setCatAdd(null);setPickerFor(null);}} style={{background:"none",border:"none",cursor:"pointer",color:T.textLt,fontSize:13,lineHeight:1,padding:"0 2px"}}>×</button>
                  </div>
                }
              </div>
            </div>
          ))}
          {budgetCats.length===0&&
            <Btn small ghost onClick={()=>setBudgetCats(DEFAULT_BUDGET_CATS)}>Restore defaults</Btn>
          }
        </div>
      </div>;
    })()}

    {/* ── 6-MONTH PLANNER TAB ── */}
    {tab==="trends"&&(()=>{
      const OLIVE="#6b7c3a";
      const RED=T.red||T.mint;
      const COL_W=54;
      const LBL_W=204;
      const DAY_W=46;
      const ACT_W=62;
      const eye={fontFamily:PP_M,fontSize:9,fontWeight:700,letterSpacing:"0.24em",textTransform:"uppercase",color:T.muted};
      const numF={fontFamily:PP_M,fontVariantNumeric:"tabular-nums"};

      const renderRow=(cat,kind,accentOverride)=>{
        const ACC=accentOverride||(kind==="income"?OLIVE:RED);
        if(cat.type==="divider"){
          return <div key={cat.id}
            draggable
            onDragStart={e=>onCatDragStart(e,cat.id)}
            onDragOver={e=>onCatDragOver(e,cat.id)}
            onDrop={e=>onCatDrop(e,cat.id)}
            onDragEnd={onCatDragEnd}
            style={{display:"flex",alignItems:"center",height:14,marginBottom:1,marginTop:2,opacity:dragCatId===cat.id?0.4:1,cursor:"grab"}}>
            <span style={{width:18,flexShrink:0,fontSize:10,color:ACC,userSelect:"none",opacity:0.35,lineHeight:1,textAlign:"center"}}>⠿</span>
            <div style={{flex:1,height:1,background:alpha(ACC,.3)}}/>
            <div style={{width:ACT_W,flexShrink:0,display:"flex",justifyContent:"center"}}>
              <button onClick={()=>removeDivider(cat.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:13,lineHeight:1,padding:"0 4px",opacity:0.5}}>×</button>
            </div>
          </div>;
        }
        const fixedAmt=envelopes.find(e=>e.category===cat.label&&e.isFixed)?.budgeted||null;
        const fillAmt=fixedAmt||planMonths.map(pm=>getPlanAmt(pm,cat.label)).find(a=>a>0)||null;
        return <div key={cat.id}
          draggable
          onDragStart={e=>onCatDragStart(e,cat.id)}
          onDragOver={e=>onCatDragOver(e,cat.id)}
          onDrop={e=>onCatDrop(e,cat.id)}
          onDragEnd={onCatDragEnd}
          style={{display:"flex",alignItems:"center",minHeight:24,marginBottom:1,opacity:dragCatId===cat.id?0.4:1,outline:dragOverCatId===cat.id?`1px solid ${alpha(ACC,.5)}`:"none",borderRadius:0,transition:"outline 0.08s"}}>
          <div style={{width:LBL_W,flexShrink:0,display:"flex",alignItems:"center",gap:7,paddingRight:8}}>
            <span draggable={false} style={{fontSize:11,color:T.muted,userSelect:"none",cursor:"grab",lineHeight:1,opacity:0.45,flexShrink:0}}>⠿</span>
            <span style={{width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",color:ACC,flexShrink:0}}><Ico n={cat.icon||"dots-three"} size={14}/></span>
            <span style={{...numF,fontSize:11,color:T.text,fontWeight:500,whiteSpace:"nowrap"}}>{cat.label}</span>
          </div>
          <div style={{width:DAY_W,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <input type="text" inputMode="numeric" pattern="[0-9]*" maxLength={2} placeholder="–"
              title={cat.day?`Debited on day ${cat.day} of each month — clear to unset`:"Set day-of-month this category is debited (1–31)"}
              value={cat.day||""}
              onChange={ev=>{const raw=ev.target.value.replace(/[^0-9]/g,"");const v=parseInt(raw);setBudgetCats(p=>p.map(c=>c.id===cat.id?{...c,day:(isNaN(v)||v<1||v>31)?undefined:v}:c));}}
              style={{width:36,...numF,fontSize:11,fontWeight:700,color:cat.day?ACC:T.muted,opacity:cat.day?0.9:0.5,background:cat.day?alpha(ACC,.08):"transparent",border:`1px solid ${cat.day?alpha(ACC,.35):alpha(T.border,.4)}`,borderRadius:0,padding:"2px 4px",outline:"none",textAlign:"center",flexShrink:0,letterSpacing:"normal"}}/>
          </div>
          {planMonths.map(m=>{
            const amt=getPlanAmt(m,cat.label);
            const editing=planCell&&planCell.month===m&&planCell.cat===cat.label;
            return editing
              ? <input key={m} autoFocus type="number" min="0" step="1" value={planVal}
                  onChange={ev=>setPlanVal(ev.target.value)}
                  onBlur={()=>{if(planVal!=="")setPlanAmt(m,cat.label,kind,planVal);setPlanCell(null);}}
                  onKeyDown={ev=>{if(ev.key==="Enter"){if(planVal!=="")setPlanAmt(m,cat.label,kind,planVal);setPlanCell(null);}if(ev.key==="Escape")setPlanCell(null);}}
                  style={{width:COL_W-2,flexShrink:0,fontSize:11,background:T.inp,border:`1px solid ${alpha(ACC,.55)}`,borderRadius:0,color:T.text,padding:"3px 4px",fontFamily:PP_M,outline:"none",textAlign:"center"}}/>
              : <div key={m}
                  onClick={()=>{if(planClickRef.current){clearTimeout(planClickRef.current);planClickRef.current=null;return;}planClickRef.current=setTimeout(()=>{planClickRef.current=null;if(amt>0){setEnvelopes(p=>p.filter(e=>!(e.month===m&&e.category===cat.label)));}else if(fillAmt!=null){setPlanAmt(m,cat.label,kind,fillAmt);}},220);}}
                  onDoubleClick={()=>{if(planClickRef.current){clearTimeout(planClickRef.current);planClickRef.current=null;}setPlanCell({month:m,cat:cat.label});setPlanVal(amt>0?String(amt):"");}}
                  title={amt>0?`Click: remove · Double-click: edit`:fillAmt?`Click: +€${fillAmt} · Double-click: custom`:"Double-click to enter"}
                  style={{width:COL_W,flexShrink:0,height:22,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",borderRadius:0,background:amt>0?alpha(ACC,.1):"transparent",borderLeft:`1px solid ${alpha(T.border,.4)}`,transition:"background 0.1s"}}>
                  {amt>0
                    ? <span style={{...numF,fontSize:10,color:ACC,fontWeight:600}}>€{amt}</span>
                    : <span style={{...numF,fontSize:11,color:T.muted,opacity:0.25}}>·</span>}
                </div>;
          })}
          <div style={{width:ACT_W,flexShrink:0,display:"flex",gap:4,justifyContent:"center",alignItems:"center"}}>
            <button onClick={()=>{if(fillAmt)fillPlanRow(cat.label,kind,fillAmt);}} title={fillAmt?`Fill all 12 months · €${fillAmt}`:"Set an amount first"}
              style={{width:22,height:22,borderRadius:0,border:`1px solid ${alpha(ACC,.35)}`,background:alpha(ACC,.1),cursor:fillAmt?"pointer":"default",color:ACC,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,padding:0,opacity:fillAmt?1:0.3}}>
              <Ico n="arrows-clockwise" size={11}/>
            </button>
            <button onClick={()=>clearPlanRow(cat.label)} title="Clear all 12 months"
              style={{width:22,height:22,borderRadius:0,border:`1px solid ${T.border}`,background:"transparent",cursor:"pointer",color:T.muted,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,padding:0,fontSize:13,lineHeight:1}}>×</button>
          </div>
        </div>;
      };

      // Year overview totals across the 12 planning months.
      const plan12=planTotals;
      const incTotal=plan12.reduce((s,{inc})=>s+inc,0);
      const expTotal=plan12.reduce((s,{exp})=>s+exp,0);
      const savTotal=plan12.reduce((s,{sav})=>s+(sav||0),0);
      const yearNet=incTotal-expTotal-savTotal;

      const dueSoon=computeDueSoon(budgetCats,envelopes,7,today);

      // Second cashflow calendar = the month after the currently-selected one (two months for planning).
      const nextCalDate=new Date(parseInt(mon.slice(0,4)),parseInt(mon.slice(5,7)),1);
      const nextCalMon=`${nextCalDate.getFullYear()}-${String(nextCalDate.getMonth()+1).padStart(2,"0")}`;

      return <div style={{display:"flex",flexDirection:"column",gap:10,paddingTop:14,paddingBottom:6}}>

        {/* ── Due in next 7 days strip ── */}
        {dueSoon.length>0&&
          <div style={{display:"flex",alignItems:"center",gap:10,paddingBottom:8,borderBottom:`1px dashed ${T.border}`,flexWrap:"wrap"}}>
            <span style={{...eye,fontSize:9,color:T.muted,flexShrink:0}}>Due · 7d</span>
            {dueSoon.map((d,i)=>{
              const isToday=d.date.toDateString()===today.toDateString();
              const dayLbl=MFULL[d.date.getMonth()].slice(0,3)+" "+d.date.getDate();
              const ACC=d.kind==="income"?OLIVE:RED;
              return <span key={i} style={{display:"inline-flex",alignItems:"baseline",gap:5,fontFamily:PP_M,fontSize:10}}>
                <span style={{fontVariantNumeric:"tabular-nums",fontWeight:isToday?700:500,color:isToday?ACC:T.muted,letterSpacing:"0.05em",textTransform:"uppercase"}}>{isToday?"Today":dayLbl}</span>
                <span style={{color:T.text,fontWeight:500}}>{d.cat.label}</span>
                {d.amt>0&&<span style={{...numF,color:ACC,fontWeight:700}}>{d.kind==="income"?"+":"−"}€{d.amt}</span>}
                {i<dueSoon.length-1&&<span style={{color:T.muted,opacity:0.4,marginLeft:5}}>·</span>}
              </span>;
            })}
          </div>
        }

        {/* ── Year overview strip ── */}
        <div style={{display:"flex",alignItems:"baseline",gap:24,paddingBottom:10,borderBottom:`1px solid ${T.border}`}}>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            <span style={{...eye,fontSize:9,color:OLIVE,opacity:0.85}}>12-Month Income</span>
            <span style={{...numF,fontSize:22,color:OLIVE,fontWeight:600,letterSpacing:"-0.5px"}}>€{incTotal.toFixed(0)}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            <span style={{...eye,fontSize:9,color:RED,opacity:0.85}}>12-Month Expenses</span>
            <span style={{...numF,fontSize:22,color:RED,fontWeight:600,letterSpacing:"-0.5px"}}>€{expTotal.toFixed(0)}</span>
          </div>
          {savTotal>0&&
            <div style={{display:"flex",flexDirection:"column",gap:2}}>
              <span style={{...eye,fontSize:9,color:SAV_COL,opacity:0.85}}>12-Month Savings</span>
              <span style={{...numF,fontSize:22,color:SAV_COL,fontWeight:600,letterSpacing:"-0.5px"}}>€{savTotal.toFixed(0)}</span>
            </div>
          }
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            <span style={{...eye,fontSize:9,opacity:0.85}}>Net Year</span>
            <span style={{...numF,fontSize:22,color:yearNet>=0?OLIVE:RED,fontWeight:600,letterSpacing:"-0.5px"}}>{yearNet>=0?"+":"−"}€{Math.abs(yearNet).toFixed(0)}</span>
          </div>
          <div style={{flex:1}}/>
          <span style={{fontFamily:PP_S,fontStyle:"italic",fontSize:13,color:T.muted,opacity:0.8,textAlign:"right",maxWidth:240,lineHeight:1.3}}>Click cells to fill · double-click to edit · drag rows to reorder.</span>
        </div>

        {/* ── Month column header ── */}
        <div style={{display:"flex",alignItems:"flex-end",paddingBottom:5,borderBottom:`1px solid ${T.border}`}}>
          <div style={{width:LBL_W,flexShrink:0,...eye,fontSize:9}}>Category</div>
          <div style={{width:DAY_W,flexShrink:0,...eye,fontSize:9,textAlign:"center"}} title="Day of month each category debits / credits">Day</div>
          {planMonths.map(m=>{
            const lbl=MFULL[parseInt(m.split("-")[1])-1].slice(0,3);
            const isCur=m===ym0;
            return <div key={m} style={{width:COL_W,flexShrink:0,textAlign:"center"}}>

              <span style={{...eye,fontSize:9,color:T.text}}>Savings</span>
              {savingsRate>0&&<span style={{fontFamily:PP_S,fontStyle:"italic",fontSize:10,color:T.muted,opacity:0.75}}>{savingsRate}% p.a.</span>}
            </div>
            <div style={{width:DAY_W,flexShrink:0}}/>
            {savingsProjection.map(({m,bal},i)=>{
              const prev=i>0?savingsProjection[i-1].bal:(savingsStart||0);
              const delta=bal-prev;
              const hasData=planTotals.slice(0,i+1).some(d=>d.inc>0||d.exp>0||d.sav>0)||savingsStart>0;
              return <div key={m} style={{width:COL_W,flexShrink:0,textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
                {hasData
                  ? <>
                      <span style={{...numF,fontSize:7,color:delta>=0?OLIVE:RED,opacity:0.7,lineHeight:1}}>{delta>=0?"+":"−"}€{Math.abs(delta).toFixed(0)}</span>
                      <span style={{...numF,fontSize:10,color:bal>=0?OLIVE:RED,fontWeight:800,letterSpacing:"-0.3px"}}>{bal<0?"−":""}€{Math.abs(bal).toFixed(0)}</span>
                    </>
                  : <span style={{...numF,fontSize:10,color:T.muted,opacity:0.25}}>—</span>}
              </div>;
            })}
            <div style={{width:ACT_W,flexShrink:0}}/>
          </div>
        </div>

        {/* ── CASHFLOW: one continuous calendar spanning the current + next month ── */}
        <CashflowCalendar months={[mon,nextCalMon]} ym0={ym0} incCats={incCats} expCats={expCats} envelopes={envelopes} savingsStart={savingsStart} today={today}/>

      </div>;
    })()}

    {/* ── CATS TAB (now merged into Plan tab — kept hidden for any legacy state) ── */}

                style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",borderRadius:0,background:dragOverCatId===cat.id?alpha(type==="income"?T.mint:T.pink,.08):"transparent",borderBottom:`1px solid ${T.border}`,opacity:dragCatId===cat.id?0.4:1,transition:"background 0.08s"}}>
                <span style={{fontSize:13,color:T.textLt,cursor:"grab",userSelect:"none",opacity:0.35,lineHeight:1,flexShrink:0}}>⠿</span>
                <button onClick={()=>{setCatAdd(null);setPickerFor(pickerFor===cat.id?null:cat.id);}}
                  style={{width:26,height:26,borderRadius:0,border:`1px solid ${pickerFor===cat.id?alpha(T.mint,.5):alpha(T.border,.3)}`,background:pickerFor===cat.id?alpha(T.mint,.12):"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:T.text}}>
                  <Ico n={cat.icon||"dots-three"} size={13}/>
                </button>
                {catEditId===cat.id
                  ?<input value={catEditLabel} onChange={ev=>setCatEditLabel(ev.target.value)}
                      onBlur={saveCatLabel} onKeyDown={ev=>{if(ev.key==="Enter")saveCatLabel();if(ev.key==="Escape")setCatEditId(null);}}
                      autoFocus style={{...IS,flex:1,padding:"2px 6px",fontSize:11}}/>
                  :<span onClick={()=>{setCatEditId(cat.id);setCatEditLabel(cat.label);}}

                <input type="number" min="1" max="31" placeholder="–" title="Day of month debited (1–31)"
                  value={cat.day||""}
                  onChange={ev=>{const v=parseInt(ev.target.value);setBudgetCats(p=>p.map(c=>c.id===cat.id?{...c,day:(isNaN(v)||v<1||v>31)?undefined:v}:c));}}
                  style={{width:34,fontSize:10,fontFamily:PP_M,fontVariantNumeric:"tabular-nums",background:T.inp,border:`1px solid ${T.border}`,borderRadius:0,color:T.text,padding:"2px 4px",outline:"none",textAlign:"center",flexShrink:0}}/>
                <span style={{fontSize:8,color:T.textLt,fontFamily:F,opacity:.5}}>{type}</span>
                <button onClick={()=>deleteCat(cat.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.textLt,fontSize:13,lineHeight:1,padding:"0 2px",flexShrink:0}}>×</button>
              </div>
            ))}
            {catAdd?.type===type&&
              <div style={{display:"flex",alignItems:"center",gap:4,padding:"5px 8px",borderRadius:0,background:T.cardAlt,border:`1px dashed ${alpha(T.border,.35)}`}}>
                <button onClick={()=>setPickerFor(pickerFor==="new"?null:"new")}
                  style={{width:26,height:26,borderRadius:0,border:`1px solid ${pickerFor==="new"?alpha(T.mint,.5):alpha(T.border,.3)}`,background:pickerFor==="new"?alpha(T.mint,.12):"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:T.text}}>

                <Btn small primary onClick={addCat}>Add</Btn>
                <button onClick={()=>{setCatAdd(null);setPickerFor(null);}} style={{background:"none",border:"none",cursor:"pointer",color:T.textLt,fontSize:13,lineHeight:1,padding:"0 2px"}}>×</button>

            }
          </div>

      ))}
      {budgetCats.length===0&&
        <Btn small ghost onClick={()=>setBudgetCats(DEFAULT_BUDGET_CATS)}>Restore defaults</Btn>
      }
    </div>}

    {/* ── ICON PICKER OVERLAY ── */}
    {pickerFor&&
      <div style={{position:"absolute",bottom:0,left:0,right:0,zIndex:30,background:T.card,borderTop:`1px solid ${T.border}`,borderRadius:0,padding:"8px 10px",boxShadow:`0 -6px 20px ${alpha("#000",.25)}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:8,color:T.textLt,fontFamily:PP_M,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.2em"}}>Choose icon</span>
          <button onClick={()=>setPickerFor(null)} style={{background:"none",border:"none",cursor:"pointer",color:T.textLt,fontSize:15,lineHeight:1,padding:"0 2px"}}>×</button>
